name: Integration Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# 避免同一时间多个并发运行（PR + push 同时触发）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system deps (for bcrypt / aiohttp)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements-dev.txt 已经 -r requirements.txt，所以一条命令搞定
          pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: github-actions-test-secret
          AI_API_KEY: github-actions-test-key
          AI_BASE_URL: "https://example.invalid"
          DEBUG: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=5

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            **/__pycache__/
          if-no-files-found: ignore
          retention-days: 3
