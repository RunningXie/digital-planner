<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — Dear Diary</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .verification-group {
            display: flex;
            gap: 0.5rem;
        }
        .verification-group .form-input {
            flex: 1;
        }
        .btn-send-code {
            white-space: nowrap;
            min-width: 120px;
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-send-code:hover:not(:disabled) {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-send-code:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .verification-status {
            font-size: 0.8125rem;
            margin-top: 0.5rem;
            display: none;
        }
        .verification-status.success {
            color: var(--success);
            display: block;
        }
        .verification-status.error {
            color: var(--error);
            display: block;
        }
        .btn-register {
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-register.enabled {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>创建账号</h1>
                <p>开始你的英文日记之旅</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" class="form-input" id="username" required placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">邮箱</label>
                    <div class="verification-group">
                        <input type="email" class="form-input" id="email" required placeholder="请输入邮箱" autocomplete="email">
                        <button type="button" class="btn-send-code" id="sendCodeBtn" disabled>发送验证码</button>
                    </div>
                    <div class="verification-status" id="emailStatus"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="verificationCode">验证码</label>
                    <input type="text" class="form-input" id="verificationCode" required placeholder="6 位验证码" maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code">
                    <div class="verification-status" id="codeStatus"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" class="form-input" id="password" required placeholder="至少 6 位" minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-register" id="registerBtn" disabled>注册</button>
                <div id="registerMsg" class="message message-error" style="display:none; margin-top: 1rem;"></div>
            </form>

            <div class="auth-footer">
                <p>已有账号？ <a href="/login">立即登录</a></p>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        let emailVerified = false;
        let countdown = 0;
        let countdownTimer = null;

        const emailInput = document.getElementById('email');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const codeInput = document.getElementById('verificationCode');
        const registerBtn = document.getElementById('registerBtn');
        const emailStatus = document.getElementById('emailStatus');
        const codeStatus = document.getElementById('codeStatus');

        // Enable send code button when email is valid
        emailInput.addEventListener('input', function() {
            const isValid = this.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
            sendCodeBtn.disabled = !isValid || emailVerified;
            if (emailVerified) {
                emailStatus.textContent = '邮箱已验证';
                emailStatus.className = 'verification-status success';
            }
        });

        // Send verification code
        sendCodeBtn.addEventListener('click', async function() {
            const email = emailInput.value.trim();
            if (!email) return;

            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '发送中...';
            emailStatus.className = 'verification-status';

            try {
                const response = await fetch('/api/auth/send-verification-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    emailStatus.textContent = '验证码已发送，请查收邮箱';
                    emailStatus.className = 'verification-status success';
                    startCountdown(60);
                } else {
                    emailStatus.textContent = data.detail || '发送失败';
                    emailStatus.className = 'verification-status error';
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                }
            } catch (error) {
                emailStatus.textContent = '网络错误，请重试';
                emailStatus.className = 'verification-status error';
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '发送验证码';
            }
        });

        // Verify code on input
        codeInput.addEventListener('input', async function() {
            const code = this.value.trim();
            if (code.length !== 6) {
                codeStatus.className = 'verification-status';
                emailVerified = false;
                updateRegisterButton();
                return;
            }

            const email = emailInput.value.trim();
            try {
                const response = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();

                if (data.verified) {
                    emailVerified = true;
                    codeStatus.textContent = '验证码正确';
                    codeStatus.className = 'verification-status success';
                    emailStatus.textContent = '邮箱已验证';
                    emailStatus.className = 'verification-status success';
                } else {
                    emailVerified = false;
                    codeStatus.textContent = data.message || '验证码错误';
                    codeStatus.className = 'verification-status error';
                }
            } catch (error) {
                codeStatus.textContent = '验证失败，请重试';
                codeStatus.className = 'verification-status error';
            }

            updateRegisterButton();
        });

        function updateRegisterButton() {
            const password = document.getElementById('password').value;
            if (emailVerified && password.length >= 6) {
                registerBtn.classList.add('enabled');
                registerBtn.disabled = false;
            } else {
                registerBtn.classList.remove('enabled');
                registerBtn.disabled = true;
            }
        }

        document.getElementById('password').addEventListener('input', updateRegisterButton);

        function startCountdown(seconds) {
            countdown = seconds;
            sendCodeBtn.textContent = `${countdown}s 后重发`;
            countdownTimer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                } else {
                    sendCodeBtn.textContent = `${countdown}s 后重发`;
                }
            }, 1000);
        }

        // Register form submit
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!emailVerified) {
                const msgEl = document.getElementById('registerMsg');
                msgEl.textContent = '请先验证邮箱';
                msgEl.className = 'message message-error';
                msgEl.style.display = 'block';
                return;
            }

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    const msgEl = document.getElementById('registerMsg');
                    msgEl.textContent = data.detail || '注册失败';
                    msgEl.className = 'message message-error';
                    msgEl.style.display = 'block';
                }
            } catch (error) {
                const msgEl = document.getElementById('registerMsg');
                msgEl.textContent = '注册出错，请重试';
                msgEl.className = 'message message-error';
                msgEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
