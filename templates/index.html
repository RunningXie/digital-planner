<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Diary — 英文日记本</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .hero {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 4rem 1.5rem 3rem;
        }

        .hero-inner {
            max-width: 720px;
            text-align: center;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3125rem 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-2);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            letter-spacing: 0.04em;
        }

        .hero-eyebrow .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .hero-icon {
            width: 56px;
            height: 56px;
            color: var(--accent);
            margin: 0 auto 1.5rem;
            display: block;
        }

        .hero h1 {
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            font-weight: 600;
        }

        .hero .lead {
            font-size: 1.0625rem;
            color: var(--text-2);
            margin-bottom: 2rem;
            line-height: 1.7;
        }

        .hero-buttons {
            display: flex;
            gap: 0.625rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-buttons .btn {
            padding: 0.6875rem 1.5rem;
            font-size: 0.9375rem;
        }

        .features {
            padding: 3rem 1.5rem 5rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .features-inner {
            max-width: 1000px;
            margin: 0 auto;
        }

        .features-title {
            text-align: center;
            font-size: 1.25rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .features-subtitle {
            text-align: center;
            color: var(--text-2);
            font-size: 0.875rem;
            margin-bottom: 2.5rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        .feature-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }

        .feature-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .feature-icon {
            width: 36px;
            height: 36px;
            color: var(--accent);
            margin-bottom: 0.875rem;
        }

        .feature-card h3 {
            color: var(--text);
            margin-bottom: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .feature-card p {
            color: var(--text-2);
            font-size: 0.875rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .hero { padding: 3rem 1rem 2rem; min-height: 70vh; }
            .hero h1 { font-size: 1.875rem; }
            .hero .lead { font-size: 0.9375rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-inner">
            <span class="hero-eyebrow">
                <span class="dot"></span>
                你的英文写作伙伴
            </span>
            <svg class="hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                <line x1="8" y1="7" x2="16" y2="7"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
            <h1>用英文记录每一天</h1>
            <p class="lead">在这里，写下你的英文日记。<br>系统会逐句分析表达，提供地道自然的优化建议。</p>
            <div class="hero-buttons">
                <a href="/register" class="btn btn-primary">开始写日记</a>
                <a href="/login" class="btn btn-secondary">登录</a>
            </div>
        </div>
    </div>

    <div class="features">
        <div class="features-inner">
            <h2 class="features-title">让英文写作更轻松</h2>
            <p class="features-subtitle">从输入第一句开始，到不断进步</p>
            <div class="features-grid">
                <div class="feature-card">
                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <h3>私密日记</h3>
                    <p>安全的账号系统，你的日记只属于你一个人，随时可以查看、修改或删除。</p>
                </div>
                <div class="feature-card">
                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="9" y1="13" x2="15" y2="13"></line>
                        <line x1="9" y1="17" x2="13" y2="17"></line>
                    </svg>
                    <h3>逐句分析</h3>
                    <p>逐句分析英文表达，给出修改建议和解释，帮你理解为什么这样写更地道。</p>
                </div>
                <div class="feature-card">
                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <h3>短语搜索</h3>
                    <p>写作时随时搜索地道的英文表达，让你的句子更自然流畅。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
