{% extends "base.html" %}

{% block title %}我的日记 — Dear Diary{% endblock %}

{% block extra_css %}
<style>
    .diaries-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .diaries-page-header h1 {
        font-size: 1.375rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .diaries-page-header h1 svg {
        width: 22px;
        height: 22px;
        color: var(--accent);
    }

    .diaries-page-header .header-actions {
        display: flex;
        gap: 0.5rem;
    }

    /* 日记列表（与 style.css 中 diary-card 一致） */
    .diary-card-header-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 0.5rem;
    }

    .diary-card-date {
        font-size: 0.8125rem;
        color: var(--text-3);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.4375rem;
        white-space: nowrap;
    }

    .diary-card-weather {
        font-size: 0.875rem;
        color: var(--text-2);
        background: var(--surface-2);
        padding: 0.1875rem 0.5rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
    }

    .diary-card-meta {
        display: flex;
        gap: 0.375rem;
        align-items: center;
        flex-wrap: wrap;
    }

    .diary-card-mood {
        font-size: 0.875rem;
        color: var(--text-2);
        background: var(--surface-2);
        padding: 0.1875rem 0.5rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
    }

    .diary-card-footer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8125rem;
        color: var(--text-3);
    }

    .diary-card-stats {
        display: flex;
        gap: 0.875rem;
        align-items: center;
    }

    .diary-card-stats > span {
        display: inline-flex;
        align-items: center;
        gap: 0.3125rem;
    }

    .diary-card-stats svg {
        width: 14px;
        height: 14px;
        color: var(--text-3);
    }

    .diary-card-actions {
        display: flex;
        gap: 0.25rem;
    }

    .diary-card-actions button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border: none;
        background: transparent;
        color: var(--text-2);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .diary-card-actions button:hover {
        background: var(--surface-2);
        color: var(--text);
    }

    .diary-card-actions button.action-delete:hover {
        background: var(--error-soft);
        color: var(--error);
    }

    .diary-card-actions button svg {
        width: 16px;
        height: 16px;
    }

    /* 弹窗：日记详情 */
    .modal-content .modal-corrections {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
    }

    .modal-content .modal-corrections h3 {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.875rem;
    }

    .modal-content .correction-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius);
        padding: 0.75rem 0.875rem;
        margin-bottom: 0.625rem;
        font-size: 0.875rem;
    }

    /* 编辑弹窗表单 */
    .edit-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .edit-form label {
        display: block;
        margin-bottom: 0.4375rem;
        color: var(--text-2);
        font-size: 0.8125rem;
        font-weight: 500;
    }

    .edit-form input[type="text"],
    .edit-form input[type="date"],
    .edit-form textarea,
    .edit-form select {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        font-family: inherit;
        font-size: 0.9375rem;
        box-sizing: border-box;
    }
    .edit-form select { cursor: pointer; }

    .edit-form input:focus,
    .edit-form textarea:focus,
    .edit-form select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .edit-form textarea {
        min-height: 220px;
        resize: vertical;
        line-height: 1.7;
    }

    .edit-form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
    }

    .edit-form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        margin-top: 0.5rem;
        flex-wrap: wrap;
    }

    .edit-form-actions .btn {
        min-width: 100px;
    }

    .edit-form-hint {
        color: var(--text-2);
        font-size: 0.8125rem;
        margin-top: -0.25rem;
    }

    .edit-form .word-count-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.5rem 0 0;
        color: var(--text-3);
        font-size: 0.8125rem;
    }

    .edit-form .word-count-bar strong {
        color: var(--text-2);
        font-weight: 500;
        font-variant-numeric: tabular-nums;
    }

    @media (max-width: 768px) {
        .edit-form textarea { min-height: 180px; }
        .edit-form-actions { flex-direction: column-reverse; }
        .edit-form-actions .btn { width: 100%; }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="diaries-page-header">
        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            我的日记
        </h1>
        <div class="header-actions">
            <a href="/write" class="btn btn-primary">写日记</a>
            <a href="/notebook" class="btn btn-secondary">笔记本</a>
        </div>
    </div>

    <div id="diariesList">
        <div class="loading"><div class="spinner"></div></div>
    </div>
</div>

<!-- 日记详情弹窗 -->
<div id="diaryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <p id="modalDate" style="color: var(--text-2); margin-bottom: 1rem; font-size: 0.875rem;"></p>
            <div id="modalContent"></div>
            <div id="modalCorrections" class="modal-corrections" style="display: none;">
                <h3>批改记录</h3>
                <div id="modalCorrectionsList"></div>
            </div>
        </div>
    </div>
</div>

<!-- 编辑日记弹窗 -->
<div id="editDiaryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>编辑日记</h2>
            <button class="modal-close" onclick="closeEditModal()">×</button>
        </div>
        <div class="modal-body">
            <form id="editDiaryForm" class="edit-form" onsubmit="event.preventDefault(); saveEditDiary();">
                <div>
                    <label for="editDiaryDate">日期</label>
                    <input type="date" id="editDiaryDate">
                </div>
                <div class="edit-form-row">
                    <div>
                        <label for="editDiaryWeather">天气</label>
                        <select id="editDiaryWeather">
                            <option value="">不选</option>
                            <option value="sunny">晴</option>
                            <option value="cloudy">多云</option>
                            <option value="rainy">雨</option>
                            <option value="snowy">雪</option>
                            <option value="stormy">暴风雨</option>
                            <option value="foggy">雾</option>
                            <option value="sunset">黄昏</option>
                            <option value="night">夜晚</option>
                        </select>
                    </div>
                    <div>
                        <label for="editDiaryMood">心情</label>
                        <select id="editDiaryMood">
                            <option value="">不选</option>
                            <option value="happy">开心</option>
                            <option value="calm">平静</option>
                            <option value="excited">兴奋</option>
                            <option value="grateful">感恩</option>
                            <option value="tired">疲惫</option>
                            <option value="anxious">焦虑</option>
                            <option value="sad">难过</option>
                            <option value="angry">生气</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="editDiaryContent">内容</label>
                    <textarea id="editDiaryContent" required placeholder="写下今天的英文日记..."></textarea>
                    <div class="word-count-bar">
                        <span><strong id="editWcWords">0</strong> 词</span>
                        <span><strong id="editWcChars">0</strong> 字符</span>
                        <span><strong id="editWcSentences">0</strong> 句</span>
                    </div>
                    <p class="edit-form-hint" style="margin-top: 0.5rem;">保存修改后，会重新生成最新的分析结果。</p>
                </div>
                <div class="edit-form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary" id="saveEditBtn">保存修改</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (!isLoggedIn()) {
        window.location.href = '/login';
    }

    // 天气标签
    const weatherLabels = {
        sunny: '晴', cloudy: '多云', rainy: '雨', snowy: '雪',
        stormy: '暴风雨', foggy: '雾', sunset: '黄昏', night: '夜晚'
    };

    // 心情标签
    const moodLabels = {
        happy: '开心', calm: '平静', excited: '兴奋', grateful: '感恩',
        tired: '疲惫', anxious: '焦虑', sad: '难过', angry: '生气'
    };

    // 加载日记列表
    async function loadDiaries() {
        const listDiv = document.getElementById('diariesList');

        try {
            const diaries = await getDiaries();

            if (diaries.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <h3>还没有日记</h3>
                        <p>开始写下你的第一篇英文日记吧！</p>
                    </div>
                `;
                return;
            }

            listDiv.innerHTML = diaries.map(diary => {
                const displayDate = diary.diary_date
                    ? new Date(diary.diary_date).toLocaleDateString('zh-CN')
                    : formatDate(diary.created_at);
                const weatherTag = diary.weather && weatherLabels[diary.weather]
                    ? `<span class="diary-card-weather">${weatherLabels[diary.weather]}</span>`
                    : '';
                const moodTag = diary.mood && moodLabels[diary.mood]
                    ? `<span class="diary-card-mood">${moodLabels[diary.mood]}</span>`
                    : '';
                const metaTags = (weatherTag || moodTag)
                    ? `<div class="diary-card-meta">${weatherTag}${moodTag}</div>`
                    : '';
                return `
                <div class="diary-card" onclick="showDiaryDetail(${diary.id})">
                    <div class="diary-card-header-row">
                        <div class="diary-card-date">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            ${displayDate}
                        </div>
                        ${metaTags}
                    </div>
                    <div class="diary-card-preview">${escapeHtml(diary.content)}</div>
                    <div class="diary-card-footer-row">
                        <div class="diary-card-stats">
                            <span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                </svg>
                                ${diary.corrections ? diary.corrections.length : 0} 处修改
                            </span>
                            <span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="4" y1="9" x2="20" y2="9"></line>
                                    <line x1="4" y1="15" x2="20" y2="15"></line>
                                    <line x1="10" y1="3" x2="8" y2="21"></line>
                                    <line x1="16" y1="3" x2="14" y2="21"></line>
                                </svg>
                                ${diary.content.length} 字符
                            </span>
                        </div>
                        <div class="diary-card-actions" onclick="event.stopPropagation()">
                            <button onclick="openEditDiary(${diary.id})" title="编辑">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                </svg>
                            </button>
                            <button onclick="deleteDiaryEntry(${diary.id})" title="删除" class="action-delete">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                                    <path d="M10 11v6"></path>
                                    <path d="M14 11v6"></path>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');

        } catch (error) {
            listDiv.innerHTML = '<p style="text-align: center; color: var(--error);">加载失败，请刷新重试</p>';
        }
    }

    async function showDiaryDetail(id) {
        try {
            const diary = await getDiary(id);

            document.getElementById('modalTitle').textContent = '日记';
            const dateLabel = diary.diary_date
                ? new Date(diary.diary_date).toLocaleDateString('zh-CN')
                : formatDate(diary.created_at);
            const metaBits = [];
            if (diary.weather && weatherLabels[diary.weather]) {
                metaBits.push(`<span class="diary-card-weather">${weatherLabels[diary.weather]}</span>`);
            }
            if (diary.mood && moodLabels[diary.mood]) {
                metaBits.push(`<span class="diary-card-mood">${moodLabels[diary.mood]}</span>`);
            }
            document.getElementById('modalDate').innerHTML = `
                <span>${dateLabel}</span>
                ${metaBits.length ? `<span class="diary-card-meta" style="margin-left: 0.5rem;">${metaBits.join('')}</span>` : ''}
            `;
            document.getElementById('modalContent').innerHTML = `<p style="line-height: 1.8; white-space: pre-wrap;">${escapeHtml(diary.content)}</p>`;

            const correctionsDiv = document.getElementById('modalCorrections');
            const correctionsList = document.getElementById('modalCorrectionsList');

            if (diary.corrections && diary.corrections.length > 0) {
                correctionsDiv.style.display = 'block';
                correctionsList.innerHTML = diary.corrections.map(c => `
                    <div class="correction-card">
                        <div style="color: var(--error); text-decoration: line-through; margin-bottom: 0.3125rem;">${escapeHtml(c.original)}</div>
                        <div style="color: var(--success); font-weight: 500; margin-bottom: 0.3125rem;">${escapeHtml(c.corrected)}</div>
                        <div style="color: var(--text-2); font-size: 0.8125rem; line-height: 1.6;">${escapeHtml(c.explanation || '无解释')}</div>
                    </div>
                `).join('');
            } else {
                correctionsDiv.style.display = 'none';
            }

            document.getElementById('diaryModal').classList.add('show');

        } catch (error) {
            showMessage('加载日记详情失败', 'error');
        }
    }

    function closeModal() {
        document.getElementById('diaryModal').classList.remove('show');
    }

    async function deleteDiaryEntry(id) {
        if (!confirm('确认删除这条日记？')) return;
        try {
            await deleteDiary(id);
            loadDiaries();
            showMessage('日记已删除', 'success');
        } catch (error) {
            showMessage('删除失败', 'error');
        }
    }

    // ========== 编辑 ==========
    let editingDiaryId = null;

    function toDateInputValue(value) {
        if (!value) return '';
        try {
            const d = new Date(value);
            if (isNaN(d.getTime())) return '';
            const tz = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - tz).toISOString().slice(0, 10);
        } catch (e) {
            return '';
        }
    }

    async function openEditDiary(id) {
        try {
            const diary = await getDiary(id);
            editingDiaryId = id;

            document.getElementById('editDiaryDate').value = toDateInputValue(diary.diary_date || diary.created_at);
            const content = diary.content || '';
            document.getElementById('editDiaryContent').value = content;
            document.getElementById('editDiaryWeather').value = diary.weather || '';
            document.getElementById('editDiaryMood').value = diary.mood || '';
            updateEditWordCount(content);

            const saveBtn = document.getElementById('saveEditBtn');
            saveBtn.disabled = false;
            saveBtn.textContent = '保存修改';

            document.getElementById('editDiaryModal').classList.add('show');

            setTimeout(() => {
                document.getElementById('editDiaryContent').focus();
            }, 50);
        } catch (error) {
            showMessage('加载日记失败，无法编辑', 'error');
        }
    }

    function updateEditWordCount(text) {
        const trimmed = (text || '').trim();
        const wordCount = trimmed ? trimmed.split(/\s+/).filter(w => /[A-Za-z0-9]/.test(w)).length : 0;
        const charCount = trimmed.length;
        const sentenceCount = trimmed ? trimmed.split(/[.!?]+/).filter(s => s.trim().length > 0).length : 0;
        const wEl = document.getElementById('editWcWords');
        const cEl = document.getElementById('editWcChars');
        const sEl = document.getElementById('editWcSentences');
        if (wEl) wEl.textContent = wordCount;
        if (cEl) cEl.textContent = charCount;
        if (sEl) sEl.textContent = sentenceCount;
    }

    document.getElementById('editDiaryContent').addEventListener('input', function(e) {
        updateEditWordCount(e.target.value);
    });

    function closeEditModal() {
        document.getElementById('editDiaryModal').classList.remove('show');
        editingDiaryId = null;
    }

    async function saveEditDiary() {
        if (!editingDiaryId) {
            showMessage('没有可保存的日记', 'error');
            return;
        }

        const dateValue = document.getElementById('editDiaryDate').value;
        const content = document.getElementById('editDiaryContent').value.trim();
        const weather = document.getElementById('editDiaryWeather').value;
        const mood = document.getElementById('editDiaryMood').value;

        if (!content) {
            showMessage('日记内容不能为空', 'error');
            return;
        }

        const saveBtn = document.getElementById('saveEditBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '正在保存…';
        try {
            const body = { content, weather: weather || null, mood: mood || null };
            if (dateValue) {
                body.diary_date = dateValue + 'T00:00:00';
            }
            await apiRequest(`/diaries/${editingDiaryId}`, {
                method: 'PUT',
                body: JSON.stringify(body)
            });
            showMessage('日记修改成功，分析结果已更新', 'success');
            closeEditModal();
            loadDiaries();
        } catch (error) {
            showMessage('保存失败：' + (error.message || '请重试'), 'error');
            saveBtn.disabled = false;
            saveBtn.textContent = '保存修改';
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('diaryModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.getElementById('editDiaryModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditModal();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
            closeEditModal();
        }
    });

    loadDiaries();
</script>
{% endblock %}
