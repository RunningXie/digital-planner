{% extends "base.html" %}

{% block title %}我的笔记本 — Dear Diary{% endblock %}

{% block extra_css %}
<style>
    .notebook-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .notebook-page-header h1 {
        font-size: 1.375rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .notebook-page-header h1 svg {
        width: 22px;
        height: 22px;
        color: var(--accent);
    }

    .notebook-page-header .header-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }

    .notebook-page-header .search-box {
        position: relative;
    }

    .notebook-page-header .search-box input {
        padding: 0.5rem 0.75rem 0.5rem 2.125rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-size: 0.875rem;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
        width: 220px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .notebook-page-header .search-box input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .notebook-page-header .search-box svg {
        position: absolute;
        left: 0.6875rem;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        color: var(--text-3);
        pointer-events: none;
    }

    /* 统计条 */
    .notebook-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.875rem;
        margin-bottom: 1.5rem;
    }

    /* 短语卡片 */
    .entry-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem 1.375rem;
        margin-bottom: 0.875rem;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .entry-card:hover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow);
    }

    .entry-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 0.875rem;
        padding-bottom: 0.875rem;
        border-bottom: 1px solid var(--border);
    }

    .entry-phrase {
        font-size: 1.0625rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.3125rem;
        font-family: var(--font-serif);
    }

    .entry-meta {
        font-size: 0.75rem;
        color: var(--text-3);
        display: flex;
        gap: 0.875rem;
        flex-wrap: wrap;
    }

    .entry-meta span {
        display: inline-flex;
        align-items: center;
        gap: 0.3125rem;
    }

    .entry-actions {
        display: flex;
        gap: 0.25rem;
        flex-shrink: 0;
    }

    .entry-actions button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.3125rem;
        padding: 0.375rem 0.6875rem;
        font-size: 0.75rem;
    }

    .entry-actions button svg {
        width: 12px;
        height: 12px;
    }

    .entry-section {
        margin-bottom: 0.875rem;
    }

    .entry-section:last-of-type {
        margin-bottom: 0;
    }

    .entry-section-title {
        font-size: 0.75rem;
        color: var(--text-3);
        margin-bottom: 0.4375rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 500;
    }

    .entry-section ul {
        margin-left: 1.25rem;
        color: var(--text);
        font-size: 0.875rem;
        line-height: 1.7;
    }

    .entry-section li {
        margin-bottom: 0.25rem;
    }

    .entry-section li strong {
        color: var(--accent);
    }

    .note-section {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius);
        padding: 0.75rem 0.875rem;
        margin-top: 0.875rem;
    }

    .note-section .entry-section-title {
        margin-bottom: 0.4375rem;
    }

    .note-section textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.5rem 0.625rem;
        resize: vertical;
        min-height: 56px;
        font-family: inherit;
        font-size: 0.875rem;
        color: var(--text);
        background: var(--surface);
        line-height: 1.6;
    }

    .note-section textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .empty-state {
        background: var(--surface);
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius-lg);
        text-align: center;
        padding: 4rem 1.5rem;
        color: var(--text-2);
    }

    .empty-state h3 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.5rem;
    }

    .empty-state p {
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="notebook-page-header">
        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            我的笔记本
        </h1>
        <div class="header-actions">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索短语…" onkeyup="handleSearch(event)">
            </div>
            <a href="/write" class="btn btn-primary">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                写日记
            </a>
        </div>
    </div>

    <div class="notebook-stats">
        <div class="stat-card">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">总短语数</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="reviewCount">0</div>
            <div class="stat-label">累计复习次数</div>
        </div>
    </div>

    <div id="entryList">
        <div class="loading"><div class="spinner"></div></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // API_BASE / getToken / apiRequest 等工具都来自 /static/js/app.js（base.html 已加载），
    // 不要再声明一次，否则会和 app.js 的全局声明冲突，整页 JS 死掉。

    function escapeHtml(text) {
        if (text == null) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    async function loadNotebook() {
        const token = getToken();
        if (!token) {
            window.location.href = '/login';
            return;
        }
        const response = await fetch(`${API_BASE}/notebook`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            const entries = await response.json();
            displayEntries(entries);
            updateStats(entries);
        } else if (response.status === 401) {
            window.location.href = '/login';
        }
    }

    function updateStats(entries) {
        const totalCount = entries.length;
        const reviewCount = entries.reduce((sum, e) => sum + (e.review_count || 0), 0);

        document.getElementById('totalCount').textContent = totalCount;
        document.getElementById('reviewCount').textContent = reviewCount;
    }

    function renderListItem(t) {
        if (typeof t === 'string') return `<li>${escapeHtml(t)}</li>`;
        return `<li><strong>${escapeHtml(t.en || '')}</strong> — ${escapeHtml(t.zh || t.meaning || '')}</li>`;
    }

    function displayEntries(entries) {
        const listDiv = document.getElementById('entryList');

        if (!entries || entries.length === 0) {
            listDiv.innerHTML = `
                <div class="empty-state">
                    <h3>还没有保存任何短语</h3>
                    <p>在写日记时搜索短语，然后点击「保存到笔记本」即可添加</p>
                    <p style="margin-top: 1rem;"><a href="/write" class="btn btn-primary btn-sm">去写日记</a></p>
                </div>
            `;
            return;
        }

        listDiv.innerHTML = entries.map(entry => `
            <div class="entry-card" data-entry-id="${entry.id}">
                <div class="entry-header">
                    <div>
                        <div class="entry-phrase">${escapeHtml(entry.phrase)}</div>
                        <div class="entry-meta">
                            <span>${formatDate(entry.created_at)}</span>
                            ${entry.last_reviewed_at ? `<span>上次复习：${formatDate(entry.last_reviewed_at)}</span>` : ''}
                            <span>复习 ${entry.review_count || 0} 次</span>
                        </div>
                    </div>
                    <div class="entry-actions">
                        <button class="btn btn-secondary btn-sm" onclick="markReviewed(${entry.id})" title="标记已复习">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            已复习
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="editEntry(${entry.id})" title="编辑笔记">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 20h9"></path>
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                            </svg>
                            笔记
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteEntry(${entry.id})" title="删除">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                ${entry.translations && entry.translations.length > 0 ? `
                    <div class="entry-section">
                        <div class="entry-section-title">翻译</div>
                        <ul>${entry.translations.map(renderListItem).join('')}</ul>
                    </div>
                ` : ''}

                ${entry.examples && entry.examples.length > 0 ? `
                    <div class="entry-section">
                        <div class="entry-section-title">例句</div>
                        <ul>${entry.examples.map(renderListItem).join('')}</ul>
                    </div>
                ` : ''}

                ${entry.alternatives && entry.alternatives.length > 0 ? `
                    <div class="entry-section">
                        <div class="entry-section-title">其他表达</div>
                        <ul>${entry.alternatives.map(renderListItem).join('')}</ul>
                    </div>
                ` : ''}

                ${entry.note ? `
                    <div class="note-section">
                        <div class="entry-section-title">我的笔记</div>
                        <textarea readonly>${escapeHtml(entry.note)}</textarea>
                    </div>
                ` : ''}
            </div>
        `).join('');
    }

    function formatDate(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        return date.toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });
    }

    async function searchNotebook() {
        const keyword = document.getElementById('searchInput').value.trim();
        const token = getToken();

        if (!keyword) {
            loadNotebook();
            return;
        }

        const response = await fetch(`${API_BASE}/notebook/search/${encodeURIComponent(keyword)}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            const result = await response.json();
            if (result.found) {
                displayEntries(result.entries);
            } else {
                document.getElementById('entryList').innerHTML = `
                    <div class="empty-state">
                        <h3>没有找到匹配的短语</h3>
                        <p>试试其他关键词</p>
                        <p style="margin-top: 1rem;"><button class="btn btn-secondary btn-sm" onclick="clearSearch()">清除搜索</button></p>
                    </div>
                `;
            }
        }
    }

    function handleSearch(event) {
        if (event.key === 'Enter') searchNotebook();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        loadNotebook();
    }

    async function markReviewed(entryId) {
        const token = getToken();
        const response = await fetch(`${API_BASE}/notebook/${entryId}/review`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            showToast('已标记为已复习', 'success');
            loadNotebook();
        }
    }

    async function deleteEntry(entryId) {
        if (!confirm('确定要删除这个短语吗？')) return;

        const token = getToken();
        const response = await fetch(`${API_BASE}/notebook/${entryId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            showToast('已删除', 'success');
            loadNotebook();
        }
    }

    async function editEntry(entryId) {
        const token = getToken();
        const response = await fetch(`${API_BASE}/notebook/${entryId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            const entry = await response.json();
            const newNote = prompt('添加或修改笔记：', entry.note || '');

            if (newNote !== null) {
                const updateResponse = await fetch(`${API_BASE}/notebook/${entryId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ note: newNote })
                });

                if (updateResponse.ok) {
                    showToast('已更新', 'success');
                    loadNotebook();
                }
            }
        }
    }

    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = 'toast-message' + (type === 'error' ? ' toast-error' : '');
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('toast-out');
            setTimeout(() => toast.remove(), 200);
        }, 2400);
    }

    document.addEventListener('DOMContentLoaded', loadNotebook);
</script>
{% endblock %}
