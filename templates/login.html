{% extends "base.html" %}

{% block title %}登录 — Dear Diary{% endblock %}

{% block content %}
<div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>欢迎回来</h1>
                <p>登录你的日记本</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" class="form-input" id="username" required placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" class="form-input" id="password" required placeholder="请输入密码" autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full">登录</button>
                <div id="loginError" class="message message-error" style="display:none; margin-top: 1rem;"></div>
            </form>

            <div class="auth-footer">
                <p>还没有账号？ <a href="/register">立即注册</a></p>
                <p style="margin-top: 0.4375rem;">
                    <a href="/forgot-password">忘记密码？</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    setToken(data.access_token);
                    window.location.href = '/diaries';
                } else {
                    document.getElementById('loginError').textContent = data.detail || '登录失败';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = '登录出错，请重试';
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
{% endblock %}
