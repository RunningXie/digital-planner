<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dear Diary — 英文日记本{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    <line x1="8" y1="7" x2="16" y2="7"></line>
                    <line x1="8" y1="11" x2="14" y2="11"></line>
                </svg>
                <span>Dear Diary</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/diaries">我的日记</a>
                <a href="/write">写日记</a>
                <a href="/notebook">笔记本</a>
                <a href="#" onclick="logout()">退出</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" class="beian-link">
                粤ICP备2026081969号-1
            </a>
            <span class="site-footer-sep">·</span>
            <span class="site-footer-meta">个人学习工具 · 仅供日常英文写作练习</span>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
