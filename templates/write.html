{% extends "base.html" %}

{% block title %}写日记 — Dear Diary{% endblock %}

{% block extra_css %}
<style>
    .write-grid {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 1.5rem;
        align-items: start;
    }

    @media (max-width: 900px) {
        .write-grid {
            grid-template-columns: 1fr;
        }
    }

    .write-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .write-page-header h1 {
        font-size: 1.375rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .write-page-header h1 svg {
        width: 22px;
        height: 22px;
        color: var(--accent);
    }

    /* 编辑器（与 style.css 中 editor-section 保持一致） */
    .editor-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
    }

    .editor-meta {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
        color: var(--text-2);
        font-size: 0.8125rem;
    }

    .editor-meta-group {
        display: flex;
        align-items: center;
        gap: 0.4375rem;
    }

    .editor-meta-group input[type="date"] {
        padding: 0.375rem 0.625rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text);
        font-size: 0.8125rem;
        font-family: inherit;
    }

    .editor-meta-group input[type="date"]:focus {
        outline: none;
        border-color: var(--accent);
    }

    .editor-toolbar-right {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-left: auto;
    }

    .auto-save-status {
        display: flex;
        align-items: center;
        gap: 0.3125rem;
        color: var(--text-3);
        font-size: 0.8125rem;
    }

    .auto-save-status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
    }

    .auto-save-status.saving .dot { background: var(--warning); }
    .auto-save-status.error .dot { background: var(--error); }

    .diary-textarea {
        width: 100%;
        min-height: 380px;
        border: none;
        background: transparent;
        color: var(--text);
        font-family: var(--font-serif);
        font-size: 1rem;
        line-height: 1.8;
        resize: vertical;
        padding: 0;
    }

    .diary-textarea:focus { outline: none; }
    .diary-textarea::placeholder { color: var(--text-3); font-style: italic; }

    .word-count-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 0 0;
        color: var(--text-3);
        font-size: 0.8125rem;
        border-top: 1px solid var(--border);
        margin-top: 1rem;
    }

    .word-count-bar strong {
        color: var(--text-2);
        font-weight: 500;
        font-variant-numeric: tabular-nums;
    }

    .submit-section {
        display: flex;
        gap: 0.625rem;
        margin-top: 1.25rem;
        flex-wrap: wrap;
    }

    .submit-section .btn { flex: 1; min-width: 120px; }

    /* 右侧栏 */
    .side-panel {
        position: sticky;
        top: 76px;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
    }

    /* 实时批改预览 */
    .realtime-section {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
    }

    .realtime-section h3 {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.4375rem;
    }

    .realtime-section h3 svg {
        width: 16px;
        height: 16px;
        color: var(--accent);
    }

    .realtime-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .realtime-list:empty::before {
        content: '开启下方开关后，句末标点会触发实时批改';
        color: var(--text-3);
        font-size: 0.8125rem;
        line-height: 1.5;
    }

    /* 批改结果区 */
    .corrections-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-top: 1.5rem;
    }

    .corrections-section-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        padding-bottom: 0.875rem;
        border-bottom: 1px solid var(--border);
    }

    .corrections-section-header h2 {
        font-size: 1.0625rem;
        font-weight: 600;
    }

    .corrections-section-header svg {
        width: 18px;
        height: 18px;
        color: var(--accent);
    }

    .correction-item {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius);
        padding: 0.875rem 1rem;
        margin-bottom: 0.6875rem;
        font-size: 0.9375rem;
    }

    .correction-original {
        color: var(--error);
        text-decoration: line-through;
        margin-bottom: 0.3125rem;
    }

    .correction-corrected {
        color: var(--success);
        font-weight: 500;
        margin-bottom: 0.3125rem;
    }

    .correction-explanation {
        color: var(--text-2);
        font-size: 0.8125rem;
        margin-top: 0.3125rem;
        line-height: 1.6;
    }

    .optimized-block {
        background: var(--success-soft);
        border: 1px solid var(--success);
        border-radius: var(--radius);
        padding: 1.25rem;
        margin-top: 1rem;
    }

    .optimized-block h4 {
        color: var(--success);
        margin-bottom: 0.5rem;
        font-size: 0.9375rem;
        font-weight: 600;
    }

    .optimized-block p {
        color: var(--text);
        line-height: 1.7;
        font-family: var(--font-serif);
    }

    /* 短语搜索 */
    .phrase-search-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
    }

    .phrase-search-box h3 {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.4375rem;
        display: flex;
        align-items: center;
        gap: 0.4375rem;
    }

    .phrase-search-box h3 svg {
        width: 16px;
        height: 16px;
        color: var(--accent);
    }

    .phrase-search-box > p {
        color: var(--text-2);
        font-size: 0.8125rem;
        margin-bottom: 0.875rem;
        line-height: 1.5;
    }

    .phrase-input-row {
        display: flex;
        gap: 0.5rem;
    }

    .phrase-input-row input {
        flex: 1;
        padding: 0.5625rem 0.875rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-size: 0.875rem;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
    }

    .phrase-input-row input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .phrase-results {
        margin-top: 0.875rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .phrase-result-block {
        background: var(--surface-2);
        border-radius: var(--radius);
        padding: 0.75rem 0.875rem;
        font-size: 0.875rem;
    }

    .phrase-result-block-title {
        font-size: 0.75rem;
        color: var(--text-3);
        margin-bottom: 0.3125rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .phrase-result-block ul {
        margin-left: 1.25rem;
        color: var(--text);
        line-height: 1.7;
    }

    .phrase-result-block strong { color: var(--accent); }

    .phrase-cache-badge {
        display: inline-block;
        font-size: 0.75rem;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 0.1875rem 0.4375rem;
        border-radius: var(--radius-sm);
        margin-bottom: 0.4375rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="write-page-header">
        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
            写日记
        </h1>
    </div>

    <div class="write-grid">
        <div>
            <div class="editor-section">
                <div class="editor-meta">
                    <div class="editor-meta-group">
                        <label for="diaryDate" style="color: var(--text-2);">日期</label>
                        <input type="date" id="diaryDate">
                    </div>
                    <div class="editor-toolbar-right">
                        <label class="toggle" title="输入句末标点时自动批改">
                            <span>逐句批改</span>
                            <input type="checkbox" id="realtimeToggle" onchange="toggleRealtimeCorrection()">
                            <span class="toggle-switch"></span>
                        </label>
                        <div class="auto-save-status" id="autoSaveStatus">
                            <span class="dot"></span>
                            <span id="autoSaveText">已自动保存</span>
                        </div>
                    </div>
                </div>

                <textarea id="diaryContent" class="diary-textarea" placeholder="Start writing your diary in English..."></textarea>

                <div class="word-count-bar">
                    <span><strong id="wcWords">0</strong> 词</span>
                    <span><strong id="wcChars">0</strong> 字符</span>
                    <span><strong id="wcSentences">0</strong> 句</span>
                </div>

                <div class="submit-section">
                    <button onclick="saveOnly()" class="btn btn-secondary">仅保存草稿</button>
                    <button onclick="saveDiary()" class="btn btn-primary" id="saveDiaryBtn">保存并批改</button>
                    <button onclick="clearEditor()" class="btn btn-ghost">清空</button>
                </div>
            </div>

            <div id="correctionsSection" class="corrections-section" style="display: none;">
                <div class="corrections-section-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="9" y1="13" x2="15" y2="13"></line>
                        <line x1="9" y1="17" x2="13" y2="17"></line>
                    </svg>
                    <h2>批改结果</h2>
                </div>
                <div id="correctionsList"></div>
                <div id="optimizedContent" class="optimized-block" style="display: none;">
                    <h4>优化后的版本</h4>
                    <p id="optimizedText"></p>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="realtime-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    实时批改
                </h3>
                <div id="realTimeCorrectionsList" class="realtime-list"></div>
            </div>

            <div class="phrase-search-box">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    短语搜索
                </h3>
                <p>输入中文或英文，搜索地道的表达方式。</p>
                <div class="phrase-input-row">
                    <input type="text" id="phraseInput" placeholder="输入短语…" onkeypress="handlePhraseKeypress(event)">
                    <button onclick="searchPhraseExpression()" class="btn btn-primary btn-sm">搜索</button>
                </div>
                <div id="phraseResults" class="phrase-results"></div>
            </div>
        </div>
    </div>
</div>

<div id="loadingOverlay" class="modal" style="display: none;">
    <div class="modal-content" style="text-align: center; max-width: 360px;">
        <div class="spinner" style="margin: 0 auto 1rem;"></div>
        <p style="color: var(--text);">AI 正在批改中…</p>
        <p style="color: var(--text-3); font-size: 0.8125rem; margin-top: 0.5rem;">通常需要 30-60 秒</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 检查登录状态
    if (!isLoggedIn()) {
        window.location.href = '/login';
    }

    // 默认今天日期
    (function initDate() {
        const dateEl = document.getElementById('diaryDate');
        if (dateEl && !dateEl.value) {
            const today = new Date();
            const tz = today.getTimezoneOffset() * 60000;
            dateEl.value = new Date(today.getTime() - tz).toISOString().slice(0, 10);
        }
    })();

    // ========== 词数统计 ==========
    function updateWordCount(text) {
        const trimmed = (text || '').trim();
        const wordCount = trimmed ? trimmed.split(/\s+/).filter(w => /[A-Za-z0-9]/.test(w)).length : 0;
        const charCount = trimmed.length;
        const sentenceCount = trimmed ? trimmed.split(/[.!?]+/).filter(s => s.trim().length > 0).length : 0;
        const wEl = document.getElementById('wcWords');
        const cEl = document.getElementById('wcChars');
        const sEl = document.getElementById('wcSentences');
        if (wEl) wEl.textContent = wordCount;
        if (cEl) cEl.textContent = charCount;
        if (sEl) sEl.textContent = sentenceCount;
    }

    document.getElementById('diaryContent').addEventListener('input', function(e) {
        updateWordCount(e.target.value);
    });

    // ========== 自动保存 ==========
    let _autoSaveTimer = null;
    let _lastSavedContent = '';
    let _currentDraftId = null;
    let _isAutoSaving = false;

    const AUTO_SAVE_INTERVAL = 30000;

    function updateAutoSaveStatus(state) {
        const el = document.getElementById('autoSaveStatus');
        const text = document.getElementById('autoSaveText');
        if (!el || !text) return;
        el.classList.remove('saving', 'error');
        if (state === 'saving') {
            el.classList.add('saving');
            text.textContent = '保存中…';
        } else if (state === 'error') {
            el.classList.add('error');
            text.textContent = '保存失败';
        } else {
            text.textContent = '已自动保存';
        }
    }

    async function autoSaveDraft() {
        const content = document.getElementById('diaryContent').value.trim();
        const diaryDate = document.getElementById('diaryDate').value;

        if (content === _lastSavedContent) return;
        if (!content) return;
        if (_isAutoSaving) return;

        _isAutoSaving = true;
        updateAutoSaveStatus('saving');

        try {
            const token = getToken();
            const payload = {
                content: content,
                diary_date: diaryDate ? diaryDate + 'T00:00:00' : null
            };

            let response;
            if (_currentDraftId) {
                response = await fetch(`${API_BASE}/diaries/${_currentDraftId}/draft`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
            } else {
                response = await fetch(`${API_BASE}/diaries/draft`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
            }

            if (response.ok) {
                const result = await response.json();
                _currentDraftId = result.id;
                _lastSavedContent = content;
                updateAutoSaveStatus('ok');
            } else {
                updateAutoSaveStatus('error');
            }
        } catch (error) {
            updateAutoSaveStatus('error');
        } finally {
            _isAutoSaving = false;
        }
    }

    function startAutoSave() {
        if (_autoSaveTimer) clearInterval(_autoSaveTimer);
        _autoSaveTimer = setInterval(autoSaveDraft, AUTO_SAVE_INTERVAL);
    }

    window.addEventListener('beforeunload', function(e) {
        const content = document.getElementById('diaryContent').value.trim();
        if (content && content !== _lastSavedContent) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ========== 实时批改 ==========
    let _sentenceCorrectionQueue = [];
    let _isCorrecting = false;
    let _lastCorrectedSentence = '';
    let _realtimeEnabled = false;

    function toggleRealtimeCorrection() {
        const checkbox = document.getElementById('realtimeToggle');
        _realtimeEnabled = checkbox.checked;
        localStorage.setItem('realtime_correction_enabled', _realtimeEnabled.toString());

        if (!_realtimeEnabled) {
            _sentenceCorrectionQueue = [];
            _lastCorrectedSentence = '';
            document.getElementById('realTimeCorrectionsList').innerHTML = '';
        }
    }

    document.getElementById('diaryContent').addEventListener('input', function(e) {
        if (!_realtimeEnabled) return;
        const content = e.target.value;
        const lastEnd = Math.max(
            content.lastIndexOf('.'),
            content.lastIndexOf('!'),
            content.lastIndexOf('?')
        );
        if (lastEnd !== -1) {
            const sentence = content.substring(0, lastEnd + 1).trim();
            if (sentence && sentence !== _lastCorrectedSentence && sentence.length > 5) {
                _lastCorrectedSentence = sentence;
                _sentenceCorrectionQueue.push(sentence);
                processCorrectionQueue();
            }
        }
    });

    async function processCorrectionQueue() {
        if (_isCorrecting || _sentenceCorrectionQueue.length === 0) return;
        _isCorrecting = true;
        const sentence = _sentenceCorrectionQueue.shift();
        try {
            const token = getToken();
            const response = await fetch(`${API_BASE}/correct-sentence?sentence=${encodeURIComponent(sentence)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const correction = await response.json();
                if (correction.explanation !== 'No errors found.') {
                    renderRealtimeCorrection(correction);
                }
            }
        } catch (error) {
            console.error('Real-time correction error:', error);
        } finally {
            _isCorrecting = false;
            processCorrectionQueue();
        }
    }

    function renderRealtimeCorrection(c) {
        const list = document.getElementById('realTimeCorrectionsList');
        const item = document.createElement('div');
        item.className = 'correction-item';
        item.innerHTML = `
            <div class="correction-original">${escapeHtml(c.original)}</div>
            <div class="correction-corrected">${escapeHtml(c.corrected)}</div>
            <div class="correction-explanation">${escapeHtml(c.explanation || '无解释')}</div>
        `;
        list.appendChild(item);
    }

    // ========== 短语搜索（流式） ==========
    function handlePhraseKeypress(e) {
        if (e.key === 'Enter') searchPhraseExpression();
    }

    async function searchPhraseExpression() {
        const phrase = document.getElementById('phraseInput').value.trim();
        if (!phrase) return;

        const resultsDiv = document.getElementById('phraseResults');
        resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

        try {
            const token = getToken();
            const response = await fetch(`${API_BASE}/search-phrase/stream`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ phrase, source_lang: 'zh', target_lang: 'en' })
            });

            if (!response.ok) throw new Error(`请求失败 (${response.status})`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let hasData = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data: ')) continue;
                    const dataStr = trimmed.slice(6);
                    if (dataStr === '[DONE]') continue;
                    try {
                        const data = JSON.parse(dataStr);
                        if (!hasData) {
                            resultsDiv.innerHTML = '';
                            hasData = true;
                        }
                        handlePhraseStreamData(data, resultsDiv);
                    } catch (e) { console.error('Parse error:', e); }
                }
            }
            if (!hasData) {
                resultsDiv.innerHTML = '<p style="color: var(--text-3); font-size: 0.8125rem;">没有找到相关结果</p>';
            }
        } catch (error) {
            resultsDiv.innerHTML = `<p style="color: var(--error); font-size: 0.8125rem;">搜索失败：${escapeHtml(error.message)}</p>`;
        }
    }

    function handlePhraseStreamData(data, resultsDiv) {
        if (data.type === 'cached') {
            displayPhraseResults(data, resultsDiv);
            return;
        }
        if (data.error) {
            resultsDiv.innerHTML = `<p style="color: var(--error);">${escapeHtml(data.error)}</p>`;
            return;
        }
        if (data.type === 'partial' && data.content) {
            resultsDiv.innerHTML = `<p style="color: var(--text-2); font-size: 0.875rem; line-height: 1.6;">${escapeHtml(data.content)}</p>`;
        }
    }

    function displayPhraseResults(result, resultsDiv) {
        resultsDiv.innerHTML = '';
        if (result.cached) {
            const badge = document.createElement('span');
            badge.className = 'phrase-cache-badge';
            badge.textContent = '来自缓存';
            resultsDiv.appendChild(badge);
        }
        if (result.translations?.length) appendPhraseSection(resultsDiv, '翻译', result.translations);
        if (result.examples?.length) appendPhraseSection(resultsDiv, '例句', result.examples);
        if (result.alternatives?.length) appendPhraseSection(resultsDiv, '其他表达', result.alternatives);
        if (!result.translations?.length && !result.examples?.length && !result.alternatives?.length) {
            resultsDiv.innerHTML = '<p style="color: var(--text-3); font-size: 0.8125rem;">没有找到相关结果</p>';
            return;
        }
        const saveBtn = document.createElement('button');
        saveBtn.className = 'btn btn-secondary btn-sm';
        saveBtn.style.marginTop = '0.5rem';
        saveBtn.style.width = '100%';
        saveBtn.textContent = '保存到笔记本';
        saveBtn.onclick = () => saveToNotebook(result);
        resultsDiv.appendChild(saveBtn);
    }

    function appendPhraseSection(container, title, items) {
        const block = document.createElement('div');
        block.className = 'phrase-result-block';
        const ul = items.map(t => `<li>${typeof t === 'string' ? escapeHtml(t) : `<strong>${escapeHtml(t.en || '')}</strong> — ${escapeHtml(t.zh || t.meaning || '')}`}</li>`).join('');
        block.innerHTML = `<div class="phrase-result-block-title">${title}</div><ul>${ul}</ul>`;
        container.appendChild(block);
    }

    async function saveToNotebook(result) {
        const token = getToken();
        try {
            const response = await fetch(`${API_BASE}/notebook`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    phrase: result.phrase || document.getElementById('phraseInput').value,
                    translations: result.translations || [],
                    examples: result.examples || [],
                    alternatives: result.alternatives || []
                })
            });
            if (response.ok) {
                showMessage('已保存到笔记本', 'success');
            } else {
                const error = await response.json();
                showMessage('保存失败：' + (error.detail || '未知错误'), 'error');
            }
        } catch (error) {
            showMessage('保存失败：' + error.message, 'error');
        }
    }

    // ========== 仅保存草稿 ==========
    async function saveOnly() {
        const content = document.getElementById('diaryContent').value.trim();
        const diaryDate = document.getElementById('diaryDate').value;

        if (!content) {
            showMessage('请输入日记内容', 'error');
            return;
        }

        try {
            const token = getToken();
            const payload = {
                content: content,
                diary_date: diaryDate ? diaryDate + 'T00:00:00' : null
            };
            let response;
            if (_currentDraftId) {
                response = await fetch(`${API_BASE}/diaries/${_currentDraftId}/draft`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
            } else {
                response = await fetch(`${API_BASE}/diaries/draft`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
            }
            if (response.ok) {
                const result = await response.json();
                _currentDraftId = result.id;
                _lastSavedContent = content;
                showMessage('草稿已保存', 'success');
            } else {
                const errorData = await response.json();
                throw new Error(errorData.detail || '保存失败');
            }
        } catch (error) {
            showMessage('保存失败：' + error.message, 'error');
        }
    }

    // ========== 保存并批改（流式） ==========
    let _isSaving = false;

    async function saveDiary() {
        if (_isSaving) return;

        const content = document.getElementById('diaryContent').value.trim();
        const diaryDate = document.getElementById('diaryDate').value;

        if (!content) {
            showMessage('请输入日记内容', 'error');
            return;
        }

        _isSaving = true;
        const saveBtn = document.getElementById('saveDiaryBtn');
        if (saveBtn) saveBtn.disabled = true;

        const section = document.getElementById('correctionsSection');
        const listDiv = document.getElementById('correctionsList');
        const optimizedDiv = document.getElementById('optimizedContent');
        const optimizedText = document.getElementById('optimizedText');

        section.style.display = 'block';
        listDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:0.5rem;color:var(--text-2);">AI 正在逐句批改中…</p></div>';
        optimizedDiv.style.display = 'none';
        section.scrollIntoView({ behavior: 'smooth' });

        try {
            const token = getToken();
            const response = await fetch(`${API_BASE}/diaries/stream`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    content: content,
                    diary_date: diaryDate ? diaryDate + 'T00:00:00' : null
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || '请求失败');
            }

            listDiv.innerHTML = '';
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data: ')) continue;
                    const dataStr = trimmed.slice(6);
                    if (dataStr === '[DONE]') continue;
                    try {
                        const data = JSON.parse(dataStr);
                        handleStreamData(data, listDiv, optimizedDiv, optimizedText);
                    } catch (e) { console.error('Parse error:', e); }
                }
            }
        } catch (error) {
            if (optimizedDiv.style.display === 'block') {
                const errCard = document.createElement('div');
                errCard.className = 'correction-item';
                errCard.style.borderLeftColor = 'var(--error)';
                errCard.innerHTML = `<div style="color: var(--error); font-weight: 500;">部分批改失败</div><div class="correction-explanation">${escapeHtml(error.message)}</div>`;
                listDiv.appendChild(errCard);
            } else {
                listDiv.innerHTML = `<div class="correction-item" style="border-left-color: var(--error);">
                    <div style="color: var(--error); font-weight: 500;">批改出错</div>
                    <div class="correction-explanation">${escapeHtml(error.message)}</div>
                </div>`;
                showMessage('批改失败：' + error.message, 'error');
            }
        } finally {
            _isSaving = false;
            if (saveBtn) saveBtn.disabled = false;
        }
    }

    function handleStreamData(data, listDiv, optimizedDiv, optimizedText) {
        if (data.type === 'optimized') {
            if (data.optimized_content) {
                optimizedDiv.style.display = 'block';
                optimizedText.textContent = data.optimized_content;
            }
            return;
        }
        if (data.type === 'done') {
            showMessage('日记已保存并批改完成', 'success');
            return;
        }
        const c = data;
        const card = document.createElement('div');
        card.className = 'correction-item';
        const hasError = c.explanation !== 'No errors found.';
        card.innerHTML = `
            <div class="correction-original">${escapeHtml(c.original)}</div>
            ${hasError ? `<div class="correction-corrected">${escapeHtml(c.corrected)}</div>` : ''}
            <div class="correction-explanation">${escapeHtml(c.explanation || '无解释')}</div>
        `;
        listDiv.appendChild(card);
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ========== 清空 ==========
    function clearEditor() {
        if (!confirm('确认清空当前内容？')) return;
        document.getElementById('diaryContent').value = '';
        document.getElementById('correctionsSection').style.display = 'none';
        document.getElementById('correctionsList').innerHTML = '';
        document.getElementById('optimizedContent').style.display = 'none';
        document.getElementById('realTimeCorrectionsList').innerHTML = '';
        _currentDraftId = null;
        _lastSavedContent = '';
        updateAutoSaveStatus('ok');
        _sentenceCorrectionQueue = [];
        _lastCorrectedSentence = '';
        updateWordCount('');
    }

    function escapeHtml(text) {
        if (text == null) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        startAutoSave();
        updateWordCount(document.getElementById('diaryContent').value);
    });
</script>
{% endblock %}
