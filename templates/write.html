<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写日记 - Dear Diary</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ========== 翻开日记本动画 ========== */
        .diary-opening-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5b7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .diary-opening-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .diary-book {
            width: 300px;
            height: 400px;
            position: relative;
            perspective: 1500px;
            transform-style: preserve-3d;
        }

        .diary-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8b6914 0%, #d4a574 50%, #8b6914 100%);
            border-radius: 0 15px 15px 0;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-origin: left center;
            animation: openCover 1.5s ease-in-out forwards;
            animation-delay: 0.8s;
            z-index: 2;
        }

        .diary-cover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 20px;
            height: 100%;
            background: linear-gradient(90deg, #6b5a1e 0%, #8b6914 100%);
            border-radius: 3px 0 0 3px;
        }

        .diary-cover-title {
            color: #fffef7;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 1rem;
            font-family: 'Georgia', serif;
        }

        .diary-cover-date {
            color: #fffef7;
            font-size: 1rem;
            opacity: 0.9;
        }

        .diary-cover-decoration {
            position: absolute;
            bottom: 30px;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fffef7, transparent);
            opacity: 0.5;
        }

        .diary-pages {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fffef7 0%, #f5f0e1 100%);
            border-radius: 0 15px 15px 0;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .diary-pages::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 20px;
            height: 100%;
            background: linear-gradient(90deg, #e8e4d9 0%, #f5f0e1 100%);
            border-radius: 3px 0 0 3px;
        }

        .diary-lines {
            width: 80%;
            height: 60%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }

        .diary-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a574, transparent);
            opacity: 0.3;
            animation: fadeInLine 0.3s ease forwards;
            opacity: 0;
        }

        .diary-line:nth-child(1) { animation-delay: 1.8s; }
        .diary-line:nth-child(2) { animation-delay: 1.9s; }
        .diary-line:nth-child(3) { animation-delay: 2.0s; }
        .diary-line:nth-child(4) { animation-delay: 2.1s; }
        .diary-line:nth-child(5) { animation-delay: 2.2s; }
        .diary-line:nth-child(6) { animation-delay: 2.3s; }
        .diary-line:nth-child(7) { animation-delay: 2.4s; }
        .diary-line:nth-child(8) { animation-delay: 2.5s; }

        @keyframes openCover {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(-160deg);
                z-index: 1;
            }
        }

        @keyframes fadeInLine {
            0% {
                opacity: 0;
                transform: scaleX(0);
            }
            100% {
                opacity: 0.3;
                transform: scaleX(1);
            }
        }

        /* 动画结束后隐藏 */
        .diary-opening-overlay.hide-animation {
            display: none;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .diary-book {
                width: 240px;
                height: 320px;
            }

            .diary-cover-title {
                font-size: 1.4rem;
            }

            .diary-cover-date {
                font-size: 0.9rem;
            }
        }

        .write-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .write-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .weather-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--warm-card);
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--warm-border);
        }
        
        .weather-selector label {
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .weather-selector select {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--warm-border);
            border-radius: 8px;
            background: var(--warm-bg);
            color: var(--warm-text);
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .weather-selector select:focus {
            outline: none;
            border-color: var(--warm-primary);
        }
        
        .title-input {
            flex: 1;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            background: transparent;
            color: var(--warm-primary-dark);
            padding: 0.5rem;
            border-bottom: 2px solid transparent;
        }
        
        .title-input:focus {
            outline: none;
            border-bottom-color: var(--warm-primary);
        }
        
        .write-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }
        
        @media (max-width: 900px) {
            .write-content {
                grid-template-columns: 1fr;
            }
        }
        
        .editor-section {
            background: var(--warm-card);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-soft);
        }
        
        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--warm-border);
        }
        
        .diary-textarea {
            width: 100%;
            min-height: 400px;
            border: none;
            background: var(--warm-bg);
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            line-height: 1.8;
            resize: vertical;
        }
        
        .diary-textarea:focus {
            outline: none;
        }
        
        .helper-section {
            position: sticky;
            top: 100px;
        }
        
        .phrase-search-box {
            background: var(--warm-card);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-soft);
            margin-bottom: 1.5rem;
        }
        
        .phrase-search-box h3 {
            color: var(--warm-primary-dark);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        .search-input-group {
            display: flex;
            gap: 0.5rem;
        }
        
        .search-input-group input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--warm-border);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .search-input-group button {
            padding: 0.75rem 1rem;
            background: var(--warm-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .phrase-results {
            margin-top: 1rem;
            min-height: 0;
        }
        
        .phrase-results:empty {
            display: none;
        }
        
        .phrase-result-item {
            background: var(--warm-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        
        .phrase-result-item strong {
            color: var(--warm-primary-dark);
        }
        
        .phrase-result-item ul {
            margin-left: 1.5rem;
            color: var(--warm-text-light);
        }
        
        .submit-section {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }
        
        .submit-section .btn {
            flex: 1;
        }
        
        .corrections-section {
            background: var(--warm-card);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-soft);
            margin-top: 2rem;
        }
        
        .correction-card {
            background: linear-gradient(135deg, #f8f4ef 0%, #f0ebe3 100%);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--warm-primary);
        }
        
        .correction-original {
            color: #c97b7b;
            text-decoration: line-through;
            margin-bottom: 0.5rem;
        }
        
        .correction-corrected {
            color: #7a9e7e;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .correction-explanation {
            color: var(--warm-text-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .suggestion-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .suggestion-tag {
            background: var(--warm-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--warm-text);
        }
        
        .optimized-content {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .optimized-content h4 {
            color: #2e7d32;
            margin-bottom: 1rem;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-content {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 天气主题样式 */
        body.weather-sunny {
            --warm-bg: #fff8e7;
            --warm-card: #fffef5;
            --warm-primary: #f4c542;
            --warm-primary-dark: #d4a835;
            --warm-secondary: #fff0c7;
            --warm-text: #5c4a1f;
            --warm-text-light: #a08040;
            --warm-border: #f0e0a0;
        }
        
        body.weather-rainy {
            --warm-bg: #e8eef2;
            --warm-card: #f0f4f8;
            --warm-primary: #6b8ba4;
            --warm-primary-dark: #4a6d8a;
            --warm-secondary: #d0dce8;
            --warm-text: #3d4a5c;
            --warm-text-light: #6b7d8f;
            --warm-border: #c0d0e0;
        }
        
        body.weather-cloudy {
            --warm-bg: #e5e8eb;
            --warm-card: #f0f2f4;
            --warm-primary: #8c9aa8;
            --warm-primary-dark: #6b7a8a;
            --warm-secondary: #d8dde3;
            --warm-text: #4a5568;
            --warm-text-light: #718096;
            --warm-border: #c8cdd3;
        }
        
        body.weather-snowy {
            --warm-bg: #f5f8fa;
            --warm-card: #ffffff;
            --warm-primary: #a8c5d8;
            --warm-primary-dark: #7ba3bd;
            --warm-secondary: #e0ecf4;
            --warm-text: #4a6070;
            --warm-text-light: #7a93a8;
            --warm-border: #c8dce8;
        }
        
        body.weather-stormy {
            --warm-bg: #2d3436;
            --warm-card: #3d484c;
            --warm-primary: #6c5ce7;
            --warm-primary-dark: #4834d4;
            --warm-secondary: #4a5568;
            --warm-text: #dfe6e9;
            --warm-text-light: #a0aec0;
            --warm-border: #4a5568;
        }
        
        body.weather-foggy {
            --warm-bg: #eceff1;
            --warm-card: #f5f7f9;
            --warm-primary: #90a4ae;
            --warm-primary-dark: #607d8b;
            --warm-secondary: #cfd8dc;
            --warm-text: #546e7a;
            --warm-text-light: #78909c;
            --warm-border: #cfd8dc;
        }
        
        body.weather-night {
            --warm-bg: #1a1a2e;
            --warm-card: #252542;
            --warm-primary: #7c6aef;
            --warm-primary-dark: #5a4ad1;
            --warm-secondary: #3a3a5c;
            --warm-text: #e0e0f0;
            --warm-text-light: #a0a0c0;
            --warm-border: #4a4a6c;
        }
        
        body.weather-sunset {
            --warm-bg: #fff0e6;
            --warm-card: #fff5ee;
            --warm-primary: #ff8a65;
            --warm-primary-dark: #e57254;
            --warm-secondary: #ffd0bc;
            --warm-text: #5c3a2d;
            --warm-text-light: #a07060;
            --warm-border: #f0c0a8;
        }
        
        /* 夜间模式特殊样式 */
        body.weather-night .navbar {
            background: linear-gradient(135deg, #252542 0%, #3a3a5c 100%);
        }
        
        body.weather-night .logo {
            color: #c4b5fd;
        }
        
        body.weather-night .nav-links a {
            color: #d0d0e8;
        }
        
        body.weather-night .nav-links a:hover {
            background-color: #3a3a5c;
            color: #c4b5fd;
        }
        
        body.weather-night .editor-section,
        body.weather-night .phrase-search-box {
            border: 1px solid #4a4a6c;
        }
        
        /* 暴风雨模式特殊样式 */
        body.weather-stormy .navbar {
            background: linear-gradient(135deg, #3d484c 0%, #2d3436 100%);
        }
        
        body.weather-stormy .logo {
            color: #a29bfe;
        }
        
        body.weather-stormy .nav-links a {
            color: #d0dce8;
        }
        
        body.weather-stormy .nav-links a:hover {
            background-color: #4a5568;
            color: #a29bfe;
        }
        
        body.weather-stormy .editor-section,
        body.weather-stormy .phrase-search-box {
            border: 1px solid #4a5568;
        }
        
        .weather-icon {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }
        
        .weather-icon:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <!-- 翻开日记本动画 -->
    <div class="diary-opening-overlay" id="diaryOpeningOverlay">
        <div class="diary-book">
            <div class="diary-pages">
                <div class="diary-lines">
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                    <div class="diary-line"></div>
                </div>
            </div>
            <div class="diary-cover">
                <div class="diary-cover-title">Dear Diary</div>
                <div class="diary-cover-date" id="coverDate"></div>
                <div class="diary-cover-decoration"></div>
            </div>
        </div>
    </div>

    <div class="write-container">
        <div class="write-header">
            <div class="header-left">
                <h1 style="color: var(--warm-primary-dark);">✍️ 写日记</h1>
                <div class="weather-selector">
                    <label for="weatherSelect" class="weather-icon" id="weatherIcon">☀️</label>
                    <select id="weatherSelect" onchange="changeWeather(this.value)">
                        <option value="sunny">晴天</option>
                        <option value="cloudy">多云</option>
                        <option value="rainy">雨天</option>
                        <option value="snowy">雪天</option>
                        <option value="stormy">暴风雨</option>
                        <option value="foggy">雾天</option>
                        <option value="sunset">黄昏</option>
                        <option value="night">夜晚</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="write-content">
            <div class="editor-section">
                <div class="editor-toolbar">
                    <span style="color: var(--warm-text-light); font-size: 0.9rem;">用英文写下今天的故事...</span>
                    <div id="autoSaveStatus" style="color: #7a9e7e; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span id="autoSaveIcon">✓</span>
                        <span id="autoSaveText">已自动保存</span>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <input type="date" id="diaryDate" class="form-input" style="flex: 0 0 150px; padding: 0.5rem;">
                    <input type="text" id="diaryTitle" class="title-input" placeholder="标题（可选）..." style="flex: 1; margin-bottom: 0;">
                </div>
                
                <textarea id="diaryContent" class="diary-textarea" placeholder="Start writing your diary in English..."></textarea>
                
                <!-- 实时句子批改预览区域 -->
                <div id="realTimeCorrections" class="real-time-corrections" style="display: none; margin-top: 1rem; padding: 1rem; background: var(--warm-bg); border-radius: 8px;">
                    <h4 style="color: var(--warm-primary-dark); margin-bottom: 0.75rem;">🔍 实时批改预览</h4>
                    <div id="realTimeCorrectionsList"></div>
                </div>
                
                <div class="submit-section">
                    <button onclick="saveOnly()" class="btn btn-secondary" style="flex: 1;">💾 仅保存</button>
                    <button onclick="saveDiary()" class="btn btn-primary" style="flex: 1;">✍️ 保存并批改</button>
                    <button onclick="clearEditor()" class="btn btn-secondary" style="flex: 0 0 80px;">清空</button>
                </div>
            </div>
            
            <div class="helper-section">
                <div class="phrase-search-box">
                    <h3>🔍 短语搜索</h3>
                    <p style="color: var(--warm-text-light); font-size: 0.85rem; margin-bottom: 1rem;">
                        不知道如何表达？输入中文或英文来搜索地道的表达方式
                    </p>
                    <div class="search-input-group">
                        <input type="text" id="phraseInput" placeholder="输入要搜索的短语..." onkeypress="handlePhraseKeypress(event)">
                        <button onclick="searchPhraseExpression()">搜索</button>
                    </div>
                    <div id="phraseResults" class="phrase-results"></div>
                </div>
                
                
            </div>
        </div>
        
        <div id="correctionsSection" class="corrections-section" style="display: none;">
            <h3 style="color: var(--warm-primary-dark); margin-bottom: 1rem;">📝 批改结果</h3>
            <div id="correctionsList"></div>
            <div id="optimizedContent" class="optimized-content" style="display: none;">
                <h4>✨ 优化后的版本</h4>
                <p id="optimizedText"></p>
            </div>
        </div>
    </div>
    
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--warm-text);">AI正在批改中，请稍候...</p>
            <p style="margin-top: 0.5rem; color: var(--warm-text-light); font-size: 0.85rem;">通常需要 30-60 秒</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // 检查登录状态
        if (!isLoggedIn()) {
            window.location.href = '/login';
        }
        
        // 天气图标映射
        const weatherIcons = {
            sunny: '☀️',
            cloudy: '☁️',
            rainy: '🌧️',
            snowy: '❄️',
            stormy: '⛈️',
            foggy: '🌫️',
            sunset: '🌅',
            night: '🌙'
        };
        
        // 切换天气主题
        function changeWeather(weather) {
            // 移除所有天气类
            document.body.className = '';
            document.body.classList.add(`weather-${weather}`);
            
            // 更新图标
            const icon = document.getElementById('weatherIcon');
            if (icon) {
                icon.textContent = weatherIcons[weather] || '☀️';
            }
            
            // 保存选择到 localStorage
            localStorage.setItem('diary_weather', weather);
        }
        
        // 页面加载时恢复天气选择
        function initWeather() {
            const savedWeather = localStorage.getItem('diary_weather');
            if (savedWeather) {
                const select = document.getElementById('weatherSelect');
                if (select) {
                    select.value = savedWeather;
                }
                changeWeather(savedWeather);
            }
        }
        
        // 初始化天气
        initWeather();

        // ========== 翻开日记本动画控制 ==========
        function initOpeningAnimation() {
            // 设置封面日期
            const coverDate = document.getElementById('coverDate');
            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            if (coverDate) {
                coverDate.textContent = dateStr;
            }

            // 检查是否需要显示动画（首次访问或刷新时显示）
            const hasSeenAnimation = sessionStorage.getItem('hasSeenDiaryAnimation');

            if (hasSeenAnimation) {
                // 已经看过动画，直接隐藏
                const overlay = document.getElementById('diaryOpeningOverlay');
                if (overlay) {
                    overlay.classList.add('hide-animation');
                }
            } else {
                // 首次访问，显示动画
                sessionStorage.setItem('hasSeenDiaryAnimation', 'true');

                // 动画结束后隐藏遮罩层
                setTimeout(() => {
                    const overlay = document.getElementById('diaryOpeningOverlay');
                    if (overlay) {
                        overlay.classList.add('fade-out');
                        setTimeout(() => {
                            overlay.classList.add('hide-animation');
                        }, 500);
                    }
                }, 2800); // 动画总时长
            }
        }

        // 页面加载时初始化动画
        initOpeningAnimation();

        // ========== 自动保存功能 ==========
        let _autoSaveTimer = null;
        let _lastSavedContent = '';
        let _lastSavedTitle = '';
        let _currentDraftId = null;
        let _isAutoSaving = false;

        const AUTO_SAVE_INTERVAL = 30000; // 30秒自动保存一次

        function updateAutoSaveStatus(isSaving, success = true) {
            const icon = document.getElementById('autoSaveIcon');
            const text = document.getElementById('autoSaveText');
            
            if (isSaving) {
                icon.textContent = '⏳';
                text.textContent = '保存中...';
            } else if (success) {
                icon.textContent = '✓';
                text.textContent = '已自动保存';
            } else {
                icon.textContent = '⚠️';
                text.textContent = '保存失败';
            }
        }

        async function autoSaveDraft() {
            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();
            const diaryDate = document.getElementById('diaryDate').value;

            // 内容没有变化，不需要保存
            if (title === _lastSavedTitle && content === _lastSavedContent) {
                return;
            }

            // 内容为空，不需要保存
            if (!content && !title) {
                return;
            }

            if (_isAutoSaving) return;
            _isAutoSaving = true;
            updateAutoSaveStatus(true);

            try {
                const token = getToken();
                const payload = {
                    title: title || "",
                    content: content,
                    diary_date: diaryDate ? diaryDate + 'T00:00:00' : null
                };

                let response;
                if (_currentDraftId) {
                    // 更新现有草稿
                    response = await fetch(`${API_BASE}/diaries/${_currentDraftId}/draft`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                } else {
                    // 创建新草稿
                    response = await fetch(`${API_BASE}/diaries/draft`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                }

                if (response.ok) {
                    const result = await response.json();
                    _currentDraftId = result.id;
                    _lastSavedTitle = title;
                    _lastSavedContent = content;
                    updateAutoSaveStatus(false, true);
                } else {
                    updateAutoSaveStatus(false, false);
                    console.error('Auto-save failed:', response.status);
                }
            } catch (error) {
                updateAutoSaveStatus(false, false);
                console.error('Auto-save error:', error);
            } finally {
                _isAutoSaving = false;
            }
        }

        // 启动自动保存定时器
        function startAutoSave() {
            if (_autoSaveTimer) {
                clearInterval(_autoSaveTimer);
            }
            _autoSaveTimer = setInterval(autoSaveDraft, AUTO_SAVE_INTERVAL);
        }

        // 页面关闭前提示保存
        window.addEventListener('beforeunload', function(e) {
            const content = document.getElementById('diaryContent').value.trim();
            if (content && content !== _lastSavedContent) {
                e.preventDefault();
                e.returnValue = '您的日记内容尚未保存，确定要离开吗？';
            }
        });

        // ========== 实时句子批改功能 ==========
        let _sentenceCorrectionQueue = [];
        let _isCorrecting = false;
        let _lastCorrectedSentence = '';

        // 监听输入，检测句号
        document.getElementById('diaryContent').addEventListener('input', function(e) {
            const content = e.target.value;
            const lastPeriodIndex = content.lastIndexOf('.');
            const lastExclaimIndex = content.lastIndexOf('!');
            const lastQuestionIndex = content.lastIndexOf('?');
            
            // 找到最后一个句子结束符
            const lastEndIndex = Math.max(lastPeriodIndex, lastExclaimIndex, lastQuestionIndex);
            
            if (lastEndIndex !== -1) {
                // 提取最后一个完整句子
                const sentence = content.substring(0, lastEndIndex + 1).trim();
                
                // 检查是否已经处理过这个句子
                if (sentence && sentence !== _lastCorrectedSentence && sentence.length > 5) {
                    _lastCorrectedSentence = sentence;
                    queueSentenceCorrection(sentence);
                }
            }
        });

        function queueSentenceCorrection(sentence) {
            // 避免重复添加相同句子
            const exists = _sentenceCorrectionQueue.some(s => s === sentence);
            if (!exists) {
                _sentenceCorrectionQueue.push(sentence);
            }
            processCorrectionQueue();
        }

        async function processCorrectionQueue() {
            if (_isCorrecting || _sentenceCorrectionQueue.length === 0) {
                return;
            }

            _isCorrecting = true;
            const sentence = _sentenceCorrectionQueue.shift();

            try {
                const token = getToken();
                const response = await fetch(`${API_BASE}/correct-sentence?sentence=${encodeURIComponent(sentence)}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const correction = await response.json();
                    updateRealTimeCorrection(correction);
                }
            } catch (error) {
                console.error('Real-time correction error:', error);
            } finally {
                _isCorrecting = false;
                processCorrectionQueue(); // 继续处理下一个
            }
        }

        function updateRealTimeCorrection(correction) {
            const section = document.getElementById('realTimeCorrections');
            const listDiv = document.getElementById('realTimeCorrectionsList');
            
            if (correction.explanation !== 'No errors found.') {
                section.style.display = 'block';
                
                const item = document.createElement('div');
                item.className = 'correction-card';
                item.style.animation = 'fadeIn 0.3s ease-in';
                item.innerHTML = `
                    <div class="correction-original">原文：${correction.original}</div>
                    <div class="correction-corrected">✓ ${correction.corrected}</div>
                    <div class="correction-explanation">📖 ${correction.explanation || '无解释'}</div>
                    ${correction.suggestions && correction.suggestions.length > 0 ? `
                        <div class="suggestion-tags">
                            ${correction.suggestions.map(s => `<span class="suggestion-tag">${s}</span>`).join('')}
                        </div>
                    ` : ''}
                `;
                
                listDiv.appendChild(item);
            }
        }

        // ========== 搜索短语 - 流式输出 ==========
        function handlePhraseKeypress(event) {
            if (event.key === 'Enter') {
                searchPhraseExpression();
            }
        }

        async function searchPhraseExpression() {
            const phrase = document.getElementById('phraseInput').value.trim();
            if (!phrase) return;

            const resultsDiv = document.getElementById('phraseResults');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:0.5rem;color:var(--warm-text-light);font-size:0.85rem;">搜索中...</p></div>';

            try {
                const token = getToken();
                const response = await fetch(`${API_BASE}/search-phrase/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        phrase: phrase,
                        source_lang: 'zh',
                        target_lang: 'en'
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Response error:', response.status, errorText);
                    throw new Error(`请求失败 (${response.status}): ${errorText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let accumulatedData = {
                    translations: [],
                    examples: [],
                    alternatives: [],
                    source: 'ai'
                };
                let hasData = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data: ')) {
                            const dataStr = trimmed.slice(6);
                            if (dataStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(dataStr);
                                // 只有收到有效数据时才清空加载状态
                                if (!hasData) {
                                    resultsDiv.innerHTML = '';
                                    hasData = true;
                                }
                                handlePhraseStreamData(data, resultsDiv, accumulatedData);
                            } catch (e) {
                                console.error('Parse error:', e, dataStr);
                            }
                        }
                    }
                }

                // 如果整个流结束后都没有收到有效数据，显示提示
                if (!hasData) {
                    resultsDiv.innerHTML = '<p style="color: var(--warm-text-light);">没有找到相关结果</p>';
                }

            } catch (error) {
                console.error('Search phrase error:', error);
                resultsDiv.innerHTML = `<p style="color: var(--warm-error);">搜索失败：${error.message}</p>`;
            }
        }

        function handlePhraseStreamData(data, resultsDiv, accumulatedData) {
            // 缓存命中，直接显示完整结果
            if (data.type === 'cached') {
                displayPhraseResults(data, resultsDiv);
                return;
            }

            // 错误
            if (data.type === 'error') {
                resultsDiv.innerHTML = `<div class="phrase-result-item" style="border-left-color: #e74c3c;">
                    <strong style="color: #e74c3c;">⚠️ 搜索出错</strong>
                    <p style="color: var(--warm-text-light);">${data.error || '未知错误'}</p>
                </div>`;
                return;
            }

            // 累积数据并逐项显示
            if (data.type === 'translations') {
                accumulatedData.translations = data.translations;
                appendPhraseSection(resultsDiv, '翻译', data.translations, 'translations-section');
            } else if (data.type === 'examples') {
                accumulatedData.examples = data.examples;
                appendPhraseSection(resultsDiv, '例句', data.examples, 'examples-section');
            } else if (data.type === 'alternatives') {
                accumulatedData.alternatives = data.alternatives;
                appendPhraseSection(resultsDiv, '其他表达', data.alternatives, 'alternatives-section');
            } else if (data.type === 'complete') {
                // 完整结果，确保所有部分都显示
                if (!document.getElementById('translations-section') && data.translations?.length) {
                    appendPhraseSection(resultsDiv, '翻译', data.translations, 'translations-section');
                }
                if (!document.getElementById('examples-section') && data.examples?.length) {
                    appendPhraseSection(resultsDiv, '例句', data.examples, 'examples-section');
                }
                if (!document.getElementById('alternatives-section') && data.alternatives?.length) {
                    appendPhraseSection(resultsDiv, '其他表达', data.alternatives, 'alternatives-section');
                }
            }
        }

        function appendPhraseSection(resultsDiv, title, items, sectionId) {
            if (!items || items.length === 0) return;

            // 检查是否已存在该section
            if (document.getElementById(sectionId)) return;

            const section = document.createElement('div');
            section.id = sectionId;
            section.className = 'phrase-result-item';
            section.style.animation = 'fadeIn 0.3s ease-in';
            section.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div style="flex: 1;">
                        <strong>${title}：</strong>
                        <ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>
                    </div>
                </div>
            `;
            resultsDiv.appendChild(section);
        }

        function displayPhraseResults(result, resultsDiv) {
            resultsDiv.innerHTML = '';

            if (result.source === 'cache') {
                // 显示缓存来源标识
                const cacheBadge = document.createElement('div');
                cacheBadge.style.cssText = 'color: #7a9e7e; font-size: 0.8rem; margin-bottom: 0.5rem;';
                cacheBadge.textContent = '⚡ 来自缓存（快速响应）';
                resultsDiv.appendChild(cacheBadge);
            }

            if (result.translations && result.translations.length > 0) {
                appendPhraseSection(resultsDiv, '翻译', result.translations, 'translations-section');
            }

            if (result.examples && result.examples.length > 0) {
                appendPhraseSection(resultsDiv, '例句', result.examples, 'examples-section');
            }

            if (result.alternatives && result.alternatives.length > 0) {
                appendPhraseSection(resultsDiv, '其他表达', result.alternatives, 'alternatives-section');
            }

            if (!result.translations?.length && !result.examples?.length && !result.alternatives?.length) {
                resultsDiv.innerHTML = '<p style="color: var(--warm-text-light);">没有找到相关结果</p>';
                return;
            }

            // 添加保存到笔记本按钮
            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn btn-secondary';
            saveBtn.style.cssText = 'margin-top: 1rem; width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;';
            saveBtn.innerHTML = '📖 保存到笔记本';
            saveBtn.onclick = () => saveToNotebook(result);
            resultsDiv.appendChild(saveBtn);
        }

        // 保存到笔记本
        async function saveToNotebook(result) {
            const token = getToken();
            const payload = {
                phrase: result.phrase || document.getElementById('phraseInput').value,
                translations: result.translations || [],
                examples: result.examples || [],
                alternatives: result.alternatives || []
            };

            try {
                const response = await fetch(`${API_BASE}/notebook`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showMessage('✅ 已保存到笔记本', 'success');
                } else {
                    const error = await response.json();
                    showMessage('保存失败：' + (error.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showMessage('保存失败：' + error.message, 'error');
            }
        }
        
        // 仅保存（不批改）
        async function saveOnly() {
            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();
            const diaryDate = document.getElementById('diaryDate').value;

            if (!content) {
                showMessage('请输入日记内容', 'error');
                return;
            }

            const saveBtn = document.querySelector('.submit-section .btn-secondary');
            if (saveBtn) saveBtn.disabled = true;

            try {
                const token = getToken();
                const payload = {
                    title: title || "",
                    content: content,
                    diary_date: diaryDate ? diaryDate + 'T00:00:00' : null
                };

                let response;
                if (_currentDraftId) {
                    response = await fetch(`${API_BASE}/diaries/${_currentDraftId}/draft`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                } else {
                    response = await fetch(`${API_BASE}/diaries/draft`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                }

                if (response.ok) {
                    const result = await response.json();
                    _currentDraftId = result.id;
                    _lastSavedTitle = title;
                    _lastSavedContent = content;
                    showMessage('日记已保存！', 'success');
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '保存失败');
                }
            } catch (error) {
                showMessage('保存失败：' + error.message, 'error');
            } finally {
                if (saveBtn) saveBtn.disabled = false;
            }
        }

        // 保存日记 — 流式逐句批改
        let _isSaving = false;
        let _eventSource = null;

        async function saveDiary() {
            if (_isSaving) return;

            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();
            const diaryDate = document.getElementById('diaryDate').value;

            if (!content) {
                showMessage('请输入日记内容', 'error');
                return;
            }

            _isSaving = true;
            const saveBtn = document.querySelector('.submit-section .btn-primary');
            if (saveBtn) saveBtn.disabled = true;

            const section = document.getElementById('correctionsSection');
            const listDiv = document.getElementById('correctionsList');
            const optimizedDiv = document.getElementById('optimizedContent');
            const optimizedText = document.getElementById('optimizedText');

            section.style.display = 'block';
            listDiv.innerHTML = '<div class="loading" style="padding: 2rem;"><div class="spinner"></div><p style="margin-top:0.5rem;color:var(--warm-text-light);">AI正在逐句批改中...</p></div>';
            optimizedDiv.style.display = 'none';
            section.scrollIntoView({ behavior: 'smooth' });

            // 先保存日记，然后启动流式批改
            try {
                // 使用 fetch 先创建日记并获取流
                const token = getToken();
                const response = await fetch(`${API_BASE}/diaries/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: title || "",
                        content: content,
                        diary_date: diaryDate ? diaryDate + 'T00:00:00' : null
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '请求失败');
                }

                // 清空加载状态
                listDiv.innerHTML = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let noErrorsCount = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留不完整的最后一行

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data: ')) {
                            const dataStr = trimmed.slice(6);
                            if (dataStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(dataStr);
                                handleStreamData(data, listDiv, optimizedDiv, optimizedText);
                                if (data.type === 'done') {
                                    showMessage('日记已保存并批改完成！', 'success');
                                }
                            } catch (e) {
                                console.error('Parse error:', e, dataStr);
                            }
                        }
                    }
                }

            } catch (error) {
                listDiv.innerHTML = `<div class="correction-card" style="border-left-color: #e74c3c;">
                    <div style="color: #e74c3c; font-weight: bold;">⚠️ 批改出错</div>
                    <div style="color: var(--warm-text-light); margin-top: 0.5rem;">${error.message}</div>
                </div>`;
                showMessage('批改失败：' + error.message, 'error');
            } finally {
                _isSaving = false;
                if (saveBtn) saveBtn.disabled = false;
            }
        }

        function handleStreamData(data, listDiv, optimizedDiv, optimizedText) {
            if (data.type === 'optimized') {
                // 显示优化后的版本
                if (data.optimized_content) {
                    optimizedDiv.style.display = 'block';
                    optimizedText.textContent = data.optimized_content;
                }
                return;
            }

            if (data.type === 'done') {
                return;
            }

            // 这是一个批改结果
            const correction = data;
            const card = document.createElement('div');
            card.className = 'correction-card';
            card.style.animation = 'fadeIn 0.3s ease-in';

            const hasError = correction.explanation !== 'No errors found.';

            card.innerHTML = `
                <div class="correction-original">原文：${correction.original}</div>
                ${hasError ? `<div class="correction-corrected">✓ ${correction.corrected}</div>` : ''}
                <div class="correction-explanation">📖 ${correction.explanation || '无解释'}</div>
                ${correction.suggestions && correction.suggestions.length > 0 ? `
                    <div class="suggestion-tags">
                        ${correction.suggestions.map(s => `<span class="suggestion-tag">${s}</span>`).join('')}
                    </div>
                ` : ''}
            `;

            listDiv.appendChild(card);

            // 自动滚动到新添加的卡片
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // 清空编辑器
        function clearEditor() {
            document.getElementById('diaryTitle').value = '';
            document.getElementById('diaryContent').value = '';
            document.getElementById('correctionsSection').style.display = 'none';
            document.getElementById('correctionsList').innerHTML = '';
            document.getElementById('optimizedContent').style.display = 'none';
            
            // 清空实时批改区域
            document.getElementById('realTimeCorrections').style.display = 'none';
            document.getElementById('realTimeCorrectionsList').innerHTML = '';
            
            // 重置自动保存状态
            _currentDraftId = null;
            _lastSavedTitle = '';
            _lastSavedContent = '';
            updateAutoSaveStatus(false, true);
            
            // 重置句子批改状态
            _sentenceCorrectionQueue = [];
            _lastCorrectedSentence = '';
        }
        
        // 页面加载完成后启动自动保存
        document.addEventListener('DOMContentLoaded', function() {
            startAutoSave();
        });
    </script>
</body>
</html>
