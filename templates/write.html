{% extends "base.html" %}

{% block title %}写日记 — Dear Diary{% endblock %}

{% block extra_css %}
<style>
    .write-page-container {
        max-width: 1080px;
    }
    @media (max-width: 768px) {
        .write-page-container { max-width: 760px; }
    }

    .write-grid {
        display: grid;
        /* 编辑区占大头，右侧辅助栏 320px；可整列收起 */
        grid-template-columns: 1fr 320px;
        gap: 1.5rem;
        align-items: start;
        transition: grid-template-columns 0.2s ease;
    }

    .write-grid.side-collapsed {
        grid-template-columns: 1fr 0;
    }

    @media (max-width: 900px) {
        .write-grid,
        .write-grid.side-collapsed {
            grid-template-columns: 1fr;
        }
    }

    .editor-card {
        /* 编辑卡片至少和视口一样高，让 textarea 有地方写 */
        min-height: calc(100vh - 200px);
    }

    .write-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .write-page-header h1 {
        font-size: 1.375rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .write-page-header h1 svg {
        width: 22px;
        height: 22px;
        color: var(--accent);
    }

    /* 编辑器（与 style.css 中 editor-section 保持一致） */
    .editor-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
    }

    .editor-meta {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
        color: var(--text-2);
        font-size: 0.8125rem;
    }

    .editor-meta-group {
        display: flex;
        align-items: center;
        gap: 0.4375rem;
    }

    .editor-meta-group input[type="date"] {
        padding: 0.375rem 0.625rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text);
        font-size: 0.8125rem;
        font-family: inherit;
    }

    .editor-meta-group input[type="date"]:focus,
    .editor-meta-group select:focus {
        outline: none;
        border-color: var(--accent);
    }

    .editor-meta-group select {
        padding: 0.375rem 0.625rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--text);
        font-size: 0.8125rem;
        font-family: inherit;
        cursor: pointer;
        min-width: 5.5rem;
    }

    .editor-toolbar-right {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-left: auto;
    }

    .auto-save-status {
        display: flex;
        align-items: center;
        gap: 0.3125rem;
        color: var(--text-3);
        font-size: 0.8125rem;
    }

    .auto-save-status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
    }

    .auto-save-status.saving .dot { background: var(--warning); }
    .auto-save-status.error .dot { background: var(--error); }

    .diary-textarea {
        width: 100%;
        /* 自适应视口高度，但不会太矮也不会太高 */
        min-height: clamp(540px, calc(100vh - 260px), 760px);
        border: none;
        background: transparent;
        color: var(--text);
        font-family: var(--font-serif);
        font-size: 1.0625rem;
        line-height: 1.85;
        resize: vertical;
        padding: 0.5rem 0;
    }

    .diary-textarea:focus { outline: none; }
    .diary-textarea::placeholder { color: var(--text-3); font-style: italic; }

    .word-count-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 0 0;
        color: var(--text-3);
        font-size: 0.8125rem;
        border-top: 1px solid var(--border);
        margin-top: 1rem;
    }

    .word-count-bar strong {
        color: var(--text-2);
        font-weight: 500;
        font-variant-numeric: tabular-nums;
    }

    .submit-section {
        display: flex;
        gap: 0.625rem;
        margin-top: 1.25rem;
        flex-wrap: wrap;
    }

    .submit-section .btn { flex: 1; min-width: 120px; }

    /* 右侧栏 */
    .side-panel {
        position: sticky;
        top: 76px;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        overflow: hidden;
        transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .write-grid.side-collapsed .side-panel {
        opacity: 0;
        transform: translateX(20px);
        pointer-events: none;
    }

    /* 右侧栏收起 / 展开按钮 */
    .side-panel-header {
        display: flex;
        justify-content: flex-end;
        margin-bottom: -0.5rem;
    }

    .side-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-2);
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        white-space: nowrap;
    }

    .side-toggle:hover {
        color: var(--accent);
        border-color: var(--border-strong);
        background: var(--surface-2);
    }

    .side-toggle svg {
        width: 12px;
        height: 12px;
    }

    /* 收起后右侧贴边的展开按钮：始终 display:flex，is-visible 控制显隐 */
    .side-expand-fab {
        position: fixed;
        right: 1rem;
        top: 50%;
        transform: translate(0, -50%);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: var(--shadow-sm);
        transition: color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease,
                    opacity 0.2s ease, transform 0.2s ease;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
    }

    .side-expand-fab.is-visible {
        opacity: 1;
        pointer-events: auto;
    }

    .side-expand-fab:hover {
        color: var(--accent);
        border-color: var(--border-strong);
        box-shadow: var(--shadow);
    }

    .side-expand-fab svg {
        width: 16px;
        height: 16px;
    }

    @media (max-width: 900px) {
        /* 移动端：右侧栏自动堆叠到下方，不需要 FAB */
        .side-expand-fab { display: none !important; }
    }

    /* 批改结果区 */
    .corrections-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-top: 1.5rem;
    }

    .corrections-section-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        padding-bottom: 0.875rem;
        border-bottom: 1px solid var(--border);
    }

    .corrections-section-header h2 {
        font-size: 1.0625rem;
        font-weight: 600;
    }

    .corrections-section-header svg {
        width: 18px;
        height: 18px;
        color: var(--accent);
    }

    .correction-item {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius);
        padding: 0.875rem 1rem;
        margin-bottom: 0.6875rem;
        font-size: 0.9375rem;
    }

    .correction-original {
        color: var(--error);
        text-decoration: line-through;
        margin-bottom: 0.3125rem;
    }

    .correction-corrected {
        color: var(--success);
        font-weight: 500;
        margin-bottom: 0.3125rem;
    }

    /* 正确句子的轻量展示：不画删除线，左边细绿条 */
    .correction-item--correct {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--success);
        border-radius: var(--radius);
        padding: 0.75rem 1rem;
        margin-bottom: 0.6875rem;
        font-size: 0.9375rem;
    }

    .correction-correct-only {
        color: var(--text-2);
        margin-bottom: 0.3125rem;
    }

    .correction-explanation--ok {
        color: var(--success);
        font-size: 0.8125rem;
    }

    .correction-explanation {
        color: var(--text-2);
        font-size: 0.8125rem;
        margin-top: 0.3125rem;
        line-height: 1.6;
    }

    .correction-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.375rem;
        margin-top: 0.5rem;
    }

    .btn-apply {
        font-size: 0.75rem;
        padding: 0.25rem 0.625rem;
        border: 1px solid var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s ease, color 0.15s ease;
        white-space: nowrap;
    }

    .btn-apply:hover {
        background: var(--accent);
        color: #fff;
    }

    .optimized-block {
        background: var(--success-soft);
        border: 1px solid var(--success);
        border-radius: var(--radius);
        padding: 1.25rem;
        margin-top: 1rem;
    }

    .optimized-block-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        gap: 0.75rem;
    }

    .optimized-block h4 {
        color: var(--success);
        font-size: 0.9375rem;
        font-weight: 600;
    }

    .btn-apply-optimized {
        font-size: 0.75rem;
        padding: 0.25rem 0.625rem;
        border: 1px solid var(--success);
        background: #fff;
        color: var(--success);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s ease, color 0.15s ease;
        white-space: nowrap;
    }

    .btn-apply-optimized:hover {
        background: var(--success);
        color: #fff;
    }

    /* 单条批改之间的等待状态 */
    .correction-pending {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: var(--surface-2);
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
        color: var(--text-2);
        font-size: 0.8125rem;
    }

    .correction-pending .spinner {
        flex-shrink: 0;
    }

    .optimized-block p {
        color: var(--text);
        line-height: 1.7;
        font-family: var(--font-serif);
    }

    /* 短语搜索 */
    .phrase-search-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
    }

    .phrase-search-box h3 {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.4375rem;
        display: flex;
        align-items: center;
        gap: 0.4375rem;
    }

    .phrase-search-box h3 svg {
        width: 16px;
        height: 16px;
        color: var(--accent);
    }

    .phrase-search-box > p {
        color: var(--text-2);
        font-size: 0.8125rem;
        margin-bottom: 0.875rem;
        line-height: 1.5;
    }

    .phrase-input-row {
        display: flex;
        gap: 0.5rem;
    }

    .phrase-input-row input {
        flex: 1;
        padding: 0.5625rem 0.875rem;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-size: 0.875rem;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
    }

    .phrase-input-row input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .phrase-results {
        margin-top: 0.875rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .phrase-result-block {
        background: var(--surface-2);
        border-radius: var(--radius);
        padding: 0.625rem 0.75rem;
        font-size: 0.8125rem;
    }

    .phrase-result-block-title {
        font-size: 0.6875rem;
        color: var(--text-3);
        margin-bottom: 0.3125rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .phrase-result-block ul {
        margin-left: 0;
        padding-left: 1.125rem;
        color: var(--text);
        line-height: 1.6;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }

    .phrase-result-block strong { color: var(--accent); }

    .phrase-result-block li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
    }

    .phrase-item-content { flex: 1; min-width: 0; }

    .phrase-save-btn {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-3);
        cursor: pointer;
        padding: 0;
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .phrase-save-btn:hover:not(:disabled) {
        color: var(--accent);
        border-color: var(--border-strong);
        background: var(--accent-soft);
    }

    .phrase-save-btn:disabled { cursor: default; }

    .phrase-save-btn.saved {
        color: var(--success);
        border-color: var(--success);
        background: var(--success-soft);
    }

    .phrase-save-btn svg { width: 12px; height: 12px; }

    .phrase-cache-badge {
        display: inline-block;
        font-size: 0.75rem;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 0.1875rem 0.4375rem;
        border-radius: var(--radius-sm);
        margin-bottom: 0.4375rem;
    }
    .phrase-notebook-badge {
        display: inline-block;
        font-size: 0.75rem;
        background: var(--success-soft);
        color: var(--success);
        padding: 0.1875rem 0.4375rem;
        border-radius: var(--radius-sm);
        margin-bottom: 0.4375rem;
        margin-right: 0.3125rem;
    }
    .phrase-dictionary-badge {
        display: inline-block;
        font-size: 0.75rem;
        background: var(--surface-2);
        color: var(--text-2);
        border: 1px solid var(--border);
        padding: 0.1875rem 0.4375rem;
        border-radius: var(--radius-sm);
        margin-bottom: 0.4375rem;
        margin-right: 0.3125rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container write-page-container">
    <div class="write-page-header">
        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
            写日记
        </h1>
    </div>

    <div class="write-grid">
        <div>
            <div class="editor-section">
                <div class="editor-meta">
                    <div class="editor-meta-group">
                        <label for="diaryDate" style="color: var(--text-2);">日期</label>
                        <input type="date" id="diaryDate">
                    </div>
                    <div class="editor-meta-group">
                        <label for="diaryWeather" style="color: var(--text-2);">天气</label>
                        <select id="diaryWeather">
                            <option value="">不选</option>
                            <option value="sunny">晴</option>
                            <option value="cloudy">多云</option>
                            <option value="rainy">雨</option>
                            <option value="snowy">雪</option>
                            <option value="stormy">暴风雨</option>
                            <option value="foggy">雾</option>
                            <option value="sunset">黄昏</option>
                            <option value="night">夜晚</option>
                        </select>
                    </div>
                    <div class="editor-meta-group">
                        <label for="diaryMood" style="color: var(--text-2);">心情</label>
                        <select id="diaryMood">
                            <option value="">不选</option>
                            <option value="happy">开心</option>
                            <option value="calm">平静</option>
                            <option value="excited">兴奋</option>
                            <option value="grateful">感恩</option>
                            <option value="tired">疲惫</option>
                            <option value="anxious">焦虑</option>
                            <option value="sad">难过</option>
                            <option value="angry">生气</option>
                        </select>
                    </div>
                    <div class="editor-toolbar-right">
                        <div class="auto-save-status" id="autoSaveStatus">
                            <span class="dot"></span>
                            <span id="autoSaveText">已自动保存</span>
                        </div>
                    </div>
                </div>

                <textarea id="diaryContent" class="diary-textarea" placeholder="Start writing your diary in English..."></textarea>

                <div class="word-count-bar">
                    <span><strong id="wcWords">0</strong> 词</span>
                    <span><strong id="wcChars">0</strong> 字符</span>
                    <span><strong id="wcSentences">0</strong> 句</span>
                </div>

                <div class="submit-section">
                    <button onclick="saveOnly()" class="btn btn-secondary">保存</button>
                    <button onclick="saveDiary()" class="btn btn-primary" id="saveDiaryBtn">批改</button>
                    <button onclick="clearEditor()" class="btn btn-ghost">清空</button>
                </div>
            </div>

            <div id="correctionsSection" class="corrections-section" style="display: none;">
                <div class="corrections-section-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="9" y1="13" x2="15" y2="13"></line>
                        <line x1="9" y1="17" x2="13" y2="17"></line>
                    </svg>
                    <h2>批改结果</h2>
                </div>
                <div id="correctionsList"></div>
                <div id="optimizedContent" class="optimized-block" style="display: none;">
                    <div class="optimized-block-header">
                        <h4>优化后的版本</h4>
                        <button type="button" class="btn-apply-optimized" onclick="applyOptimized()">应用到原文</button>
                    </div>
                    <p id="optimizedText"></p>
                </div>
            </div>
        </div>

        <div class="side-panel" id="sidePanel">
            <div class="side-panel-header">
                <button type="button" class="side-toggle" onclick="toggleSidePanel()" title="收起右侧栏" aria-label="收起右侧栏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                    <span>收起</span>
                </button>
            </div>
            <div class="phrase-search-box">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    短语搜索
                </h3>
                <p>输入中文或英文，搜索地道的表达方式。</p>
                <div class="phrase-input-row">
                    <input type="text" id="phraseInput" placeholder="输入短语…" onkeypress="handlePhraseKeypress(event)">
                    <button onclick="searchPhraseExpression()" class="btn btn-primary btn-sm">搜索</button>
                </div>
                <div id="phraseResults" class="phrase-results"></div>
            </div>
        </div>
    </div>
</div>

<button type="button" id="sideExpandFab" class="side-expand-fab" onclick="toggleSidePanel()" title="展开右侧栏" aria-label="展开右侧栏">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
</button>

<div id="loadingOverlay" class="modal" style="display: none;">
    <div class="modal-content" style="text-align: center; max-width: 360px;">
        <div class="spinner" style="margin: 0 auto 1rem;"></div>
        <p style="color: var(--text);">正在分析中…</p>
        <p style="color: var(--text-3); font-size: 0.8125rem; margin-top: 0.5rem;">通常需要 30-60 秒</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 检查登录状态
    if (!isLoggedIn()) {
        window.location.href = '/login';
    }

    // 默认今天日期
    (function initDate() {
        const dateEl = document.getElementById('diaryDate');
        if (dateEl && !dateEl.value) {
            const today = new Date();
            const tz = today.getTimezoneOffset() * 60000;
            dateEl.value = new Date(today.getTime() - tz).toISOString().slice(0, 10);
        }
    })();

    // ========== 词数统计 ==========
    function updateWordCount(text) {
        const trimmed = (text || '').trim();
        const wordCount = trimmed ? trimmed.split(/\s+/).filter(w => /[A-Za-z0-9]/.test(w)).length : 0;
        const charCount = trimmed.length;
        const sentenceCount = trimmed ? trimmed.split(/[.!?]+/).filter(s => s.trim().length > 0).length : 0;
        const wEl = document.getElementById('wcWords');
        const cEl = document.getElementById('wcChars');
        const sEl = document.getElementById('wcSentences');
        if (wEl) wEl.textContent = wordCount;
        if (cEl) cEl.textContent = charCount;
        if (sEl) sEl.textContent = sentenceCount;
    }

    document.getElementById('diaryContent').addEventListener('input', function(e) {
        updateWordCount(e.target.value);
    });

    // ========== 自动保存 ==========
    let _autoSaveTimer = null;
    let _lastSavedContent = '';
    let _currentDiaryId = null;
    let _isAutoSaving = false;

    const AUTO_SAVE_INTERVAL = 30000;

    // 右侧栏收起 / 展开
    function toggleSidePanel() {
        const grid = document.querySelector('.write-grid');
        const fab = document.getElementById('sideExpandFab');
        const btn = document.querySelector('.side-toggle');
        if (!grid) return;
        const collapsed = grid.classList.toggle('side-collapsed');
        if (fab) fab.classList.toggle('is-visible', collapsed);
        if (btn) {
            const label = btn.querySelector('span');
            const icon = btn.querySelector('svg polyline');
            if (label) label.textContent = collapsed ? '展开' : '收起';
            if (icon) icon.setAttribute('points', collapsed ? '15 18 9 12 15 6' : '9 18 15 12 9 6');
            btn.setAttribute('title', collapsed ? '展开右侧栏' : '收起右侧栏');
            btn.setAttribute('aria-label', collapsed ? '展开右侧栏' : '收起右侧栏');
        }
    }

    function updateAutoSaveStatus(state) {
        const el = document.getElementById('autoSaveStatus');
        const text = document.getElementById('autoSaveText');
        if (!el || !text) return;
        el.classList.remove('saving', 'error');
        if (state === 'saving') {
            el.classList.add('saving');
            text.textContent = '保存中…';
        } else if (state === 'error') {
            el.classList.add('error');
            text.textContent = '保存失败';
        } else {
            text.textContent = '已自动保存';
        }
    }

    async function autoSaveDiary() {
        const content = document.getElementById('diaryContent').value;
        const diaryDate = document.getElementById('diaryDate').value;
        const weather = document.getElementById('diaryWeather').value;
        const mood = document.getElementById('diaryMood').value;

        if (content === _lastSavedContent) return;
        if (!content) return;
        if (_isAutoSaving) return;

        _isAutoSaving = true;
        updateAutoSaveStatus('saving');

        try {
            const token = getToken();
            const payload = {
                content: content,
                diary_date: diaryDate ? diaryDate + 'T00:00:00' : null,
                weather: weather || null,
                mood: mood || null,
            };

            let response;
            if (_currentDiaryId) {
                response = await fetch(`${API_BASE}/diaries/${_currentDiaryId}/draft`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
            } else {
                response = await fetch(`${API_BASE}/diaries/draft`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
            }

            if (response.ok) {
                const result = await response.json();
                _currentDiaryId = result.id;
                _lastSavedContent = content;
                updateAutoSaveStatus('ok');
            } else {
                updateAutoSaveStatus('error');
            }
        } catch (error) {
            updateAutoSaveStatus('error');
        } finally {
            _isAutoSaving = false;
        }
    }

    function startAutoSave() {
        if (_autoSaveTimer) clearInterval(_autoSaveTimer);
        _autoSaveTimer = setInterval(autoSaveDiary, AUTO_SAVE_INTERVAL);
    }

    window.addEventListener('beforeunload', function(e) {
        const content = document.getElementById('diaryContent').value.trim();
        if (content && content !== _lastSavedContent) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // 把单条批改应用到原文里，替换对应的 original 句为 corrected 句
    function applyCorrection(c, itemEl) {
        const textarea = document.getElementById('diaryContent');
        const content = textarea.value;
        const original = c.original || '';
        const corrected = c.corrected || '';
        if (!original || !corrected || original === corrected) return;

        // 找到 original 在正文中的位置（只替换第一次出现）
        const idx = content.indexOf(original);
        if (idx === -1) {
            showMessage('未在原文找到对应句子，可能已被修改', 'error');
            return;
        }

        const newContent = content.substring(0, idx) + corrected + content.substring(idx + original.length);
        textarea.value = newContent;

        // 移除这条批改卡，避免堆叠
        if (itemEl && itemEl.parentNode) {
            itemEl.parentNode.removeChild(itemEl);
        }
        // 触发自动保存
        _lastSavedContent = '';

        updateWordCount(newContent);
        showMessage('已应用到原文', 'success');
    }

    // 把"优化后的版本"整段替换进正文
    function applyOptimized() {
        const optimized = document.getElementById('optimizedText').textContent;
        if (!optimized) return;
        const textarea = document.getElementById('diaryContent');

        textarea.value = optimized;

        // 清空所有批改结果
        document.getElementById('correctionsList').innerHTML = '';
        _lastSavedContent = '';  // 触发一次自动保存

        updateWordCount(optimized);
        showMessage('已应用优化版本', 'success');
    }

    // ========== 短语搜索（流式） ==========
    let _currentStreamingResult = null;

    function handlePhraseKeypress(e) {
        if (e.key === 'Enter') searchPhraseExpression();
    }

    async function searchPhraseExpression() {
        const phrase = document.getElementById('phraseInput').value.trim();
        if (!phrase) return;

        const resultsDiv = document.getElementById('phraseResults');
        resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        _currentStreamingResult = null;

        try {
            const token = getToken();
            const response = await fetch(`${API_BASE}/search-phrase/stream`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ phrase, source_lang: 'zh', target_lang: 'en' })
            });

            if (!response.ok) throw new Error(`请求失败 (${response.status})`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let hasData = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data: ')) continue;
                    const dataStr = trimmed.slice(6);
                    if (dataStr === '[DONE]') continue;
                    try {
                        const data = JSON.parse(dataStr);
                        if (!hasData) {
                            resultsDiv.innerHTML = '';
                            hasData = true;
                        }
                        handlePhraseStreamData(data, resultsDiv, phrase);
                    } catch (e) { console.error('Parse error:', e); }
                }
            }
            if (!hasData) {
                resultsDiv.innerHTML = '<p style="color: var(--text-3); font-size: 0.8125rem;">没有找到相关结果</p>';
            }
        } catch (error) {
            resultsDiv.innerHTML = `<p style="color: var(--error); font-size: 0.8125rem;">搜索失败：${escapeHtml(error.message)}</p>`;
        }
    }

    function handlePhraseStreamData(data, resultsDiv, query) {
        if (data.type === 'cached') {
            displayPhraseResults(data, resultsDiv);
            return;
        }
        if (!_currentStreamingResult) {
            _currentStreamingResult = { phrase: query, translations: [], examples: [], alternatives: [] };
        }
        // 流式响应：分别增量渲染各 section（避免每段覆盖上一段）
        if (data.type === 'translations' && data.translations?.length) {
            _currentStreamingResult.translations = data.translations;
            appendPhraseSection(resultsDiv, '翻译', data.translations);
            return;
        }
        if (data.type === 'examples' && data.examples?.length) {
            _currentStreamingResult.examples = data.examples;
            appendPhraseSection(resultsDiv, '例句', data.examples);
            return;
        }
        if (data.type === 'alternatives' && data.alternatives?.length) {
            _currentStreamingResult.alternatives = data.alternatives;
            appendPhraseSection(resultsDiv, '其他表达', data.alternatives);
            return;
        }
        if (data.type === 'complete') {
            // 三个 section 已渲染完，加一个"保存全部"按钮
            appendSaveAllButton(resultsDiv, _currentStreamingResult);
            return;
        }
        if (data.error) {
            resultsDiv.innerHTML = `<p style="color: var(--error);">${escapeHtml(data.error)}</p>`;
            return;
        }
        if (data.type === 'partial' && data.content) {
            resultsDiv.innerHTML = `<p style="color: var(--text-2); font-size: 0.875rem; line-height: 1.6;">${escapeHtml(data.content)}</p>`;
        }
    }

    function displayPhraseResults(result, resultsDiv) {
        resultsDiv.innerHTML = '';
        // 笔记本命中（用户自己的词条）→ 绿色"已收藏"徽章
        if (result.source === 'notebook') {
            const badge = document.createElement('span');
            badge.className = 'phrase-notebook-badge';
            badge.textContent = '已收藏 · 来自你的笔记本';
            resultsDiv.appendChild(badge);
        } else if (result.source === 'dictionary' || result.source === 'ecdict') {
            // 内置静态词典命中 → 中性灰"离线词库"徽章
            // dictionary = 精选短语  ecdict = 通用词典
            const badge = document.createElement('span');
            badge.className = 'phrase-dictionary-badge';
            badge.textContent = '离线词库';
            resultsDiv.appendChild(badge);
        } else if (result.source === 'cache') {
            // 内存缓存命中 → 暖棕"来自缓存"徽章
            const badge = document.createElement('span');
            badge.className = 'phrase-cache-badge';
            badge.textContent = '来自缓存';
            resultsDiv.appendChild(badge);
        }
        if (result.translations?.length) appendPhraseSection(resultsDiv, '翻译', result.translations);
        if (result.examples?.length) appendPhraseSection(resultsDiv, '例句', result.examples);
        if (result.alternatives?.length) appendPhraseSection(resultsDiv, '其他表达', result.alternatives);
        if (!result.translations?.length && !result.examples?.length && !result.alternatives?.length) {
            resultsDiv.innerHTML = '<p style="color: var(--text-3); font-size: 0.8125rem;">没有找到相关结果</p>';
            return;
        }
        appendSaveAllButton(resultsDiv, result);
    }

    function appendPhraseSection(container, title, items) {
        const block = document.createElement('div');
        block.className = 'phrase-result-block';
        const ul = items.map(t => {
            const content = typeof t === 'string'
                ? escapeHtml(t)
                : `<strong>${escapeHtml(t.en || '')}</strong> — ${escapeHtml(t.zh || t.meaning || '')}`;
            const itemText = typeof t === 'string' ? t : (t.en || t.zh || t.meaning || '');
            return `<li>
                <span class="phrase-item-content">${content}</span>
                <button type="button" class="phrase-save-btn" data-text="${escapeHtml(itemText)}" data-section="${escapeHtml(title)}" title="保存到笔记本" aria-label="保存到笔记本">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
            </li>`;
        }).join('');
        block.innerHTML = `<div class="phrase-result-block-title">${title}</div><ul>${ul}</ul>`;
        container.appendChild(block);
        block.querySelectorAll('.phrase-save-btn').forEach(btn => {
            btn.addEventListener('click', () => handleItemSave(btn));
        });
    }

    function appendSaveAllButton(container, result) {
        // 避免重复添加
        if (container.querySelector('.phrase-save-all')) return;
        // 笔记本命中就不显示"保存全部"，已收藏
        if (result.source === 'notebook') return;
        const saveBtn = document.createElement('button');
        saveBtn.type = 'button';
        saveBtn.className = 'btn btn-secondary btn-sm phrase-save-all';
        saveBtn.textContent = '保存全部到笔记本';
        saveBtn.onclick = () => saveToNotebook(result, saveBtn);
        container.appendChild(saveBtn);
    }

    async function saveToNotebook(result, btn) {
        const token = getToken();
        const originalText = btn ? btn.textContent : null;
        if (btn) {
            btn.disabled = true;
            btn.textContent = '保存中…';
        }
        try {
            const response = await fetch(`${API_BASE}/notebook`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    phrase: result.phrase || document.getElementById('phraseInput').value,
                    translations: result.translations || [],
                    examples: result.examples || [],
                    alternatives: result.alternatives || []
                })
            });
            if (response.ok) {
                showMessage('已保存到笔记本', 'success');
                if (btn) {
                    btn.textContent = '已保存 ✓';
                    btn.classList.add('saved');
                }
            } else {
                const error = await response.json();
                showMessage('保存失败：' + (error.detail || '未知错误'), 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            }
        } catch (error) {
            showMessage('保存失败：' + error.message, 'error');
            if (btn) {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
    }

    async function handleItemSave(btn) {
        if (btn.classList.contains('saved') || btn.disabled) return;
        const text = btn.dataset.text;
        if (!text) return;
        btn.disabled = true;
        try {
            const token = getToken();
            const response = await fetch(`${API_BASE}/notebook`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    phrase: text,
                    translations: [],
                    examples: [],
                    alternatives: []
                })
            });
            if (response.ok) {
                btn.classList.add('saved');
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            } else {
                const err = await response.json();
                showMessage('保存失败：' + (err.detail || '未知错误'), 'error');
                btn.disabled = false;
            }
        } catch (error) {
            showMessage('保存失败：' + error.message, 'error');
            btn.disabled = false;
        }
    }

    // ========== 批改（流式） ==========
    let _isSaving = false;

    async function saveDiary() {
        if (_isSaving) return;

        const content = document.getElementById('diaryContent').value.trim();
        const diaryDate = document.getElementById('diaryDate').value;
        const weather = document.getElementById('diaryWeather').value;
        const mood = document.getElementById('diaryMood').value;

        if (!content) {
            showMessage('请输入日记内容', 'error');
            return;
        }

        _isSaving = true;
        const saveBtn = document.getElementById('saveDiaryBtn');
        if (saveBtn) saveBtn.disabled = true;

        const section = document.getElementById('correctionsSection');
        const listDiv = document.getElementById('correctionsList');
        const optimizedDiv = document.getElementById('optimizedContent');
        const optimizedText = document.getElementById('optimizedText');

        section.style.display = 'block';
        listDiv.innerHTML = '';
        appendPendingIndicator(listDiv);
        optimizedDiv.style.display = 'none';
        section.scrollIntoView({ behavior: 'smooth' });

        try {
            const token = getToken();
            // 复用已有日记：有 _currentDiaryId 就 PUT（更新后再批改），
            // 避免保存 + 批改按钮产生两条记录。
            const url = _currentDiaryId
                ? `${API_BASE}/diaries/${_currentDiaryId}/stream`
                : `${API_BASE}/diaries/stream`;
            const method = _currentDiaryId ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    content: content,
                    diary_date: diaryDate ? diaryDate + 'T00:00:00' : null,
                    weather: weather || null,
                    mood: mood || null,
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || '请求失败');
            }

            listDiv.innerHTML = '';
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed.startsWith('data: ')) continue;
                    const dataStr = trimmed.slice(6);
                    if (dataStr === '[DONE]') continue;
                    try {
                        const data = JSON.parse(dataStr);
                        handleStreamData(data, listDiv, optimizedDiv, optimizedText);
                    } catch (e) { console.error('Parse error:', e); }
                }
            }
        } catch (error) {
            removePendingIndicator(listDiv);
            if (optimizedDiv.style.display === 'block') {
                const errCard = document.createElement('div');
                errCard.className = 'correction-item';
                errCard.style.borderLeftColor = 'var(--error)';
                errCard.innerHTML = `<div style="color: var(--error); font-weight: 500;">部分批改失败</div><div class="correction-explanation">${escapeHtml(error.message)}</div>`;
                listDiv.appendChild(errCard);
            } else {
                listDiv.innerHTML = `<div class="correction-item" style="border-left-color: var(--error);">
                    <div style="color: var(--error); font-weight: 500;">批改出错</div>
                    <div class="correction-explanation">${escapeHtml(error.message)}</div>
                </div>`;
                showMessage('批改失败：' + error.message, 'error');
            }
        } finally {
            _isSaving = false;
            if (saveBtn) saveBtn.disabled = false;
        }
    }

    function handleStreamData(data, listDiv, optimizedDiv, optimizedText) {
        if (data.type === 'optimized') {
            if (data.optimized_content) {
                optimizedDiv.style.display = 'block';
                optimizedText.textContent = data.optimized_content;
            }
            return;
        }
        if (data.type === 'done') {
            removePendingIndicator(listDiv);
            // 同步日记 id 和最后保存内容（保证后续保存还认这条记录）
            if (data.diary_id) _currentDiaryId = data.diary_id;
            _lastSavedContent = document.getElementById('diaryContent').value.trim();
            showMessage('日记已保存并批改完成', 'success');
            return;
        }
        const c = data;
        // 收到一条批改：先摘掉 pending，避免和卡片混杂
        removePendingIndicator(listDiv);
        const card = document.createElement('div');

        // 判断这条批改是不是"没找到错误"：
        //  1. original 去除空白后与 corrected 相同（最可靠的事实）
        //  2. explanation 出现"没有发现错误"或"no error"等关键字
        // 满足任一条，就当作正确，不画删除线、不显示"应用"按钮
        const noTextChange = (c.original || '').trim() === (c.corrected || '').trim();
        const explanation = (c.explanation || '').toLowerCase();
        const saysNoError = /没有发现错误|没有语法错误|没有错误|no error|没有需要修正|表达清晰自然|表达自然/.test(explanation);
        const hasError = !noTextChange && !saysNoError
            && c.original && c.corrected;

        if (!hasError) {
            // 正确的句子：绿色提示"这句没问题"，不画删除线
            card.className = 'correction-item correction-item--correct';
            card.innerHTML = `
                <div class="correction-correct-only">${escapeHtml(c.original || '')}</div>
                <div class="correction-explanation correction-explanation--ok">${escapeHtml(c.explanation || '没有发现错误。')}</div>
            `;
            listDiv.appendChild(card);
            appendPendingIndicator(listDiv);
            return;
        }

        // 有错误的句子：原句（删除线）+ 改正后 + 解释 + 应用按钮
        card.className = 'correction-item';
        card.innerHTML = `
            <div class="correction-original">${escapeHtml(c.original)}</div>
            <div class="correction-corrected">${escapeHtml(c.corrected)}</div>
            <div class="correction-explanation">${escapeHtml(c.explanation || '无解释')}</div>
            <div class="correction-actions">
                <button type="button" class="btn-apply">应用</button>
            </div>
        `;
        const applyBtn = card.querySelector('.btn-apply');
        if (applyBtn) {
            applyBtn.addEventListener('click', function() {
                applyCorrection(c, card);
            });
        }
        listDiv.appendChild(card);
        // 在最后追加 pending，等待下一条
        appendPendingIndicator(listDiv);
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 在批改列表末尾追加一个等待下一句的提示
    function appendPendingIndicator(listDiv) {
        if (listDiv.querySelector('.correction-pending')) return;
        const pending = document.createElement('div');
        pending.className = 'correction-pending';
        pending.innerHTML = '<div class="spinner"></div><span>正在批改下一句…</span>';
        listDiv.appendChild(pending);
    }

    function removePendingIndicator(listDiv) {
        const pending = listDiv.querySelector('.correction-pending');
        if (pending && pending.parentNode) {
            pending.parentNode.removeChild(pending);
        }
    }

    // ========== 清空 ==========
    function clearEditor() {
        if (!confirm('确认清空当前内容？')) return;
        document.getElementById('diaryContent').value = '';
        document.getElementById('correctionsSection').style.display = 'none';
        document.getElementById('correctionsList').innerHTML = '';
        document.getElementById('optimizedContent').style.display = 'none';
        _currentDiaryId = null;
        _lastSavedContent = '';
        updateAutoSaveStatus('ok');
        updateWordCount('');
    }

    function escapeHtml(text) {
        if (text == null) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    // 初始化
