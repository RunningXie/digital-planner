<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 — Dear Diary</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>
                    <svg class="auth-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1l3 6 6 .9-4.5 4.4 1 6.2L12 15.8 6.5 18.5l1-6.2L3 7.9 9 7z"></path>
                    </svg>
                    管理员登录
                </h1>
                <p>请输入管理员账号密码</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" class="form-input" id="username" required placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" class="form-input" id="password" required placeholder="请输入密码" autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full">登录</button>
                <div id="errorMessage" class="message message-error" style="display:none; margin-top: 1rem;"></div>
                <div id="successMessage" class="message message-success" style="display:none; margin-top: 1rem;"></div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // 检查是否已登录
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/admin/check`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    window.location.href = '/admin';
                }
            } catch {
                // 未登录，继续显示登录页面
            }
        }

        // 显示消息
        function showMessage(type, message) {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            if (type === 'error') {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            } else {
                successEl.textContent = message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
            }
        }

        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('success', '登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 800);
                } else {
                    showMessage('error', data.detail || '登录失败');
                }
            } catch (error) {
                showMessage('error', '网络错误，请稍后重试');
            }
        });

        // 页面加载时检查登录状态
        checkAuth();
    </script>
</body>
</html>
