<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - Dear Diary</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .verification-group {
            display: flex;
            gap: 0.5rem;
        }
        .verification-group .form-input {
            flex: 1;
        }
        .btn-send-code {
            white-space: nowrap;
            min-width: 120px;
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-send-code:hover:not(:disabled) {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-send-code:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .verification-status {
            font-size: 0.8125rem;
            margin-top: 0.5rem;
            display: none;
        }
        .verification-status.success {
            color: var(--success);
            display: block;
        }
        .verification-status.error {
            color: var(--error);
            display: block;
        }
        .btn-reset {
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-reset.enabled {
            opacity: 1;
            pointer-events: auto;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.75rem;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 0.4375rem;
            color: var(--text-3);
            font-size: 0.8125rem;
        }
        .step.active {
            color: var(--text);
            font-weight: 500;
        }
        .step.done {
            color: var(--success);
        }
        .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--surface-2);
            color: var(--text-3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid var(--border-strong);
        }
        .step.active .step-num {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .step.done .step-num {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>忘记密码</h1>
                <p>通过邮箱验证重置密码</p>
            </div>

            <div class="step-indicator">
                <div class="step active" id="step1Indicator">
                    <span class="step-num">1</span>
                    <span>验证邮箱</span>
                </div>
                <div class="step" id="step2Indicator">
                    <span class="step-num">2</span>
                    <span>设置新密码</span>
                </div>
            </div>
            
            <form id="forgotForm">
                <!-- Step 1: Email verification -->
                <div id="step1">
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <div class="verification-group">
                            <input type="email" class="form-input" id="email" required placeholder="请输入注册邮箱">
                            <button type="button" class="btn-send-code" id="sendCodeBtn" disabled>发送验证码</button>
                        </div>
                        <div class="verification-status" id="emailStatus"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <input type="text" class="form-input" id="verificationCode" required placeholder="请输入6位验证码" maxlength="6" pattern="[0-9]{6}">
                        <div class="verification-status" id="codeStatus"></div>
                    </div>
                </div>

                <!-- Step 2: New password -->
                <div id="step2" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-input" id="newPassword" required placeholder="请输入新密码（至少6位）" minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <input type="password" class="form-input" id="confirmPassword" required placeholder="请再次输入新密码" minlength="6">
                        <div class="verification-status" id="passwordMatchStatus"></div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full btn-reset" id="actionBtn" disabled>验证邮箱</button>
                <div id="forgotMsg" class="message" style="display:none; margin-top:1rem;"></div>
            </form>
            
            <div class="auth-footer">
                <p>想起密码了？ <a href="/login">返回登录</a></p>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        let currentStep = 1;
        let emailVerified = false;
        let countdown = 0;
        let countdownTimer = null;

        const emailInput = document.getElementById('email');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const codeInput = document.getElementById('verificationCode');
        const actionBtn = document.getElementById('actionBtn');
        const emailStatus = document.getElementById('emailStatus');
        const codeStatus = document.getElementById('codeStatus');

        // Enable send code button when email is valid
        emailInput.addEventListener('input', function() {
            const isValid = this.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
            sendCodeBtn.disabled = !isValid || emailVerified;
        });

        // Send verification code
        sendCodeBtn.addEventListener('click', async function() {
            const email = emailInput.value.trim();
            if (!email) return;

            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '发送中...';
            emailStatus.className = 'verification-status';

            try {
                const response = await fetch('/api/auth/send-verification-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    emailStatus.textContent = '验证码已发送，请查收邮箱';
                    emailStatus.className = 'verification-status success';
                    startCountdown(60);
                } else {
                    emailStatus.textContent = data.detail || '发送失败';
                    emailStatus.className = 'verification-status error';
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                }
            } catch (error) {
                emailStatus.textContent = '网络错误，请重试';
                emailStatus.className = 'verification-status error';
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '发送验证码';
            }
        });

        // Verify code on input
        codeInput.addEventListener('input', async function() {
            const code = this.value.trim();
            if (code.length !== 6) {
                codeStatus.className = 'verification-status';
                emailVerified = false;
                updateActionBtn();
                return;
            }

            const email = emailInput.value.trim();
            try {
                const response = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();

                if (data.verified) {
                    emailVerified = true;
                    codeStatus.textContent = '验证码正确 ✓';
                    codeStatus.className = 'verification-status success';
                    emailStatus.textContent = '邮箱已验证 ✓';
                    emailStatus.className = 'verification-status success';
                } else {
                    emailVerified = false;
                    codeStatus.textContent = data.message || '验证码错误';
                    codeStatus.className = 'verification-status error';
                }
            } catch (error) {
                codeStatus.textContent = '验证失败，请重试';
                codeStatus.className = 'verification-status error';
            }

            updateActionBtn();
        });

        function updateActionBtn() {
            if (currentStep === 1) {
                actionBtn.disabled = !emailVerified;
                actionBtn.textContent = '验证邮箱';
                actionBtn.className = 'btn btn-primary btn-full btn-reset' + (emailVerified ? ' enabled' : '');
            } else {
                const newPwd = document.getElementById('newPassword').value;
                const confirmPwd = document.getElementById('confirmPassword').value;
                const match = newPwd === confirmPwd && newPwd.length >= 6;
                actionBtn.disabled = !match;
                actionBtn.textContent = '重置密码';
                actionBtn.className = 'btn btn-primary btn-full btn-reset' + (match ? ' enabled' : '');
            }
        }

        // Password match check
        document.getElementById('newPassword').addEventListener('input', checkPasswordMatch);
        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        function checkPasswordMatch() {
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            const statusEl = document.getElementById('passwordMatchStatus');

            if (confirmPwd.length === 0) {
                statusEl.className = 'verification-status';
            } else if (newPwd === confirmPwd) {
                statusEl.textContent = '密码一致 ✓';
                statusEl.className = 'verification-status success';
            } else {
                statusEl.textContent = '两次输入的密码不一致';
                statusEl.className = 'verification-status error';
            }
            updateActionBtn();
        }

        function startCountdown(seconds) {
            countdown = seconds;
            sendCodeBtn.textContent = `${countdown}s 后重发`;
            countdownTimer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                } else {
                    sendCodeBtn.textContent = `${countdown}s 后重发`;
                }
            }, 1000);
        }

        // Form submit
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (currentStep === 1) {
                if (!emailVerified) {
                    const msgEl = document.getElementById('forgotMsg');
                    msgEl.textContent = '请先验证邮箱';
                    msgEl.className = 'message message-error';
                    msgEl.style.display = 'block';
                    return;
                }
                // Move to step 2
                currentStep = 2;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('step1Indicator').className = 'step done';
                document.getElementById('step2Indicator').className = 'step active';
                actionBtn.disabled = true;
                actionBtn.textContent = '重置密码';
                actionBtn.className = 'btn btn-primary btn-full btn-reset';
                return;
            }

            // Step 2: Reset password
            const email = emailInput.value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                const msgEl = document.getElementById('forgotMsg');
                msgEl.textContent = '两次输入的密码不一致';
                msgEl.className = 'message message-error';
                msgEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    const msgEl = document.getElementById('forgotMsg');
                    msgEl.textContent = '密码重置成功！即将跳转到登录页面...';
                    msgEl.className = 'message message-success';
                    msgEl.style.display = 'block';
                    actionBtn.disabled = true;
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    const msgEl = document.getElementById('forgotMsg');
                    msgEl.textContent = data.detail || '重置失败';
                    msgEl.className = 'message message-error';
                    msgEl.style.display = 'block';
                }
            } catch (error) {
                const msgEl = document.getElementById('forgotMsg');
                msgEl.textContent = '重置出错，请重试';
                msgEl.className = 'message message-error';
                msgEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
